// CORS-safe fetch with multi-proxy fallback
async function corsProxyFetch(url,opts){
  // Try direct first (works locally or when CORS is allowed)
  try{
    var ac=new AbortController();var tm=setTimeout(function(){ac.abort()},4000);
    var r=await fetch(url,Object.assign({signal:ac.signal},opts||{}));
    clearTimeout(tm);
    if(r.ok)return r;
  }catch(e){}
  // Try each proxy in order
  for(var i=0;i<CORS_PROXIES.length;i++){
    try{
      var pUrl=CORS_PROXIES[i]+encodeURIComponent(url);
      var r2=await fetch(pUrl,opts||{});
      if(r2.ok){console.log("[DE] CORS proxy "+i+" succeeded for "+url.substring(0,60));return r2;}
    }catch(e){console.log("[DE] CORS proxy "+i+" failed:",e.message);}
  }
  throw new Error("All CORS proxies failed for: "+url.substring(0,80));
}

// ═══════════════════════════════════════════════════════════
// BET TRACKER — localStorage-backed bet history + P&L
// ═══════════════════════════════════════════════════════════
var TRACKER_KEY="de_bet_tracker";

function loadTracker(){
  try{var s=localStorage.getItem(TRACKER_KEY);if(s)return JSON.parse(s);}catch(e){}
  return[];
}
function saveTracker(bets){
  try{localStorage.setItem(TRACKER_KEY,JSON.stringify(bets));}catch(e){}
}
var trackedBets=loadTracker();

function betKey(b){
  // Unique key per bet: sport+player+market+date
  var d=new Date(b.time||Date.now()).toISOString().slice(0,10);
  return(b.sport||"")+"_"+(b.player||"")+"_"+(b.market||"")+"_"+d;
}
function findTracked(key){
  return trackedBets.find(function(tb){return tb.key===key});
}
function trackBet(bet){
  var key=betKey(bet);
  var existing=findTracked(key);
  if(existing)return; // already tracked
  trackedBets.push({
    key:key,sport:bet.sport,icon:bet.icon,type:bet.type,
    player:bet.player,market:bet.market,line:bet.line,
    book:bet.book,edge:bet.edge,kelly:bet.scaledKelly||bet.kelly,
    amount:bet.betAmount||0,matchup:bet.matchup,time:bet.time,
    placed:new Date().toISOString(),result:null,payout:0
  });
  saveTracker(trackedBets);render();
}
function untrackBet(key){
  trackedBets=trackedBets.filter(function(b){return b.key!==key});
  saveTracker(trackedBets);render();
}
function recordResult(key,result){
  var tb=findTracked(key);
  if(!tb)return;
  tb.result=result; // "W", "L", or "P" (push)
  if(result==="W"){
    // Calculate payout from the line (moneyline odds)
    var ml=parseInt(tb.line.replace("+",""))||0;
    if(ml>0)tb.payout=+(tb.amount*(ml/100)).toFixed(2);
    else if(ml<0)tb.payout=+(tb.amount*(100/(-ml))).toFixed(2);
    else tb.payout=0;
  }else if(result==="P"){
    tb.payout=0;
  }else{
    tb.payout=-tb.amount;
  }
  saveTracker(trackedBets);render();
}
function clearTracker(){
  if(!confirm("Clear ALL tracked bet history?"))return;
  trackedBets=[];saveTracker(trackedBets);render();
}
function trackerStats(){
  var total=trackedBets.filter(function(b){return b.result!=null}).length;
  var wins=trackedBets.filter(function(b){return b.result==="W"}).length;
  var losses=trackedBets.filter(function(b){return b.result==="L"}).length;
  var pushes=trackedBets.filter(function(b){return b.result==="P"}).length;
  var pending=trackedBets.filter(function(b){return b.result==null}).length;
  var totalWagered=trackedBets.filter(function(b){return b.result!=null}).reduce(function(s,b){return s+b.amount},0);
  var totalPayout=trackedBets.filter(function(b){return b.result!=null}).reduce(function(s,b){return s+b.payout},0);
  var roi=totalWagered>0?((totalPayout/totalWagered)*100).toFixed(1):0;
  var units=totalWagered>0?(totalPayout/(totalWagered/total||1)).toFixed(2):0;
  return{total:total,wins:wins,losses:losses,pushes:pushes,pending:pending,
    wagered:totalWagered,payout:totalPayout,profit:+(totalPayout).toFixed(2),roi:roi,units:units};
}

function ml2p(ml){return ml<0?-ml/(-ml+100):100/(ml+100)}
function p2ml(p){if(p==null||p<=0||p>=100)return null;var d=p/100;return d>=0.5?Math.round(-d/(1-d)*100):Math.round((1-d)/d*100)}
function fml(ml){return ml==null?"—":ml>0?"+"+ml:""+ml}
function fImp(p){var ml=p2ml(p);return ml==null?"—":ml>0?"+"+ml:""+ml}
function ft(d){return new Date(d).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
function fd(d){return new Date(d).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
function ds(d){return d.toISOString().slice(0,10)}

async function fetchNHLFatigue(){
  // Check last 3 days of NHL schedule for B2B and fatigue
  var fatigue={};
  for(var i=0;i<=3;i++){
    var d=new Date();d.setDate(d.getDate()-i);
    try{
      var data=await fetchNHL("/schedule/"+ds(d));
      var gw=data.gameWeek||[];
      // Only look at the specific date we requested
      gw.forEach(function(day){
        if(day.date!==ds(d))return;
        (day.games||[]).forEach(function(g){
          var state=g.gameState||"";
          // Count games that are finished or in progress
          if(state==="OFF"||state==="FINAL"||state==="LIVE"||state==="CRIT"||(i>0)){
            var ht=g.homeTeam?g.homeTeam.abbrev:"";
            var at=g.awayTeam?g.awayTeam.abbrev:"";
            [ht,at].forEach(function(t){
              if(!t)return;
              if(!fatigue[t])fatigue[t]={games:[],daysAgo:[]};
              fatigue[t].games.push(g.id);
              fatigue[t].daysAgo.push(i);
            });
          }
        });
      });
    }catch(e){}
  }
  // Calculate rest days and B2B status
  var result={};
  Object.keys(fatigue).forEach(function(t){
    var days=fatigue[t].daysAgo.filter(function(d){return d>0}).sort();
    var isB2B=days.indexOf(1)>=0&&days.filter(function(d){return d<=1}).length>=1;
    // Also check if playing today (daysAgo=0) AND played yesterday (daysAgo=1)
    var playingToday=fatigue[t].daysAgo.indexOf(0)>=0;
    var playedYesterday=fatigue[t].daysAgo.indexOf(1)>=0;
    var b2bToday=playingToday&&playedYesterday;
    var lastGame=days.length?days[0]:99;
    var gamesIn3=days.filter(function(d){return d<=3}).length;
    result[t]={
      b2b:b2bToday,
      restDays:lastGame,
      gamesIn3Days:gamesIn3,
      gamesTotal:fatigue[t].games.length,
    };
  });
  return result;
}


async function fetchStatcastPitcherRates(){
  // Fetch Statcast pitcher expected stats: xwOBA-against, xERA, K rates
  var prates={};
  var year=new Date().getFullYear();
  // Pitcher expected stats CSV from Baseball Savant
  var savantUrl="https://baseballsavant.mlb.com/leaderboard/expected_statistics?type=pitcher&year="+year+"&position=&team=&min=25&csv=true";
  
  try{
    var r=await corsProxyFetch(savantUrl);
    if(!r||!r.ok){console.log("[Diamond Edge] Pitcher Statcast fetch failed");return prates;}
    
    var text=await r.text();
    var lines=text.trim().split("\n");
    if(lines.length<2){console.log("[Diamond Edge] Pitcher Statcast: no data");return prates;}
    
    // Parse header to find column indices
    var header=lines[0].toLowerCase();
    var count=0;
    for(var i=1;i<lines.length;i++){
      // Same CSV format: "LastName, FirstName", player_id, year, pa, ...
      var m=lines[i].match(/^"([^"]+)"\s*,\s*"?(\d+)"?\s*,\s*"?(\d+)"?\s*,\s*"?(\d+)"?\s*,\s*"?(\d+)"?\s*,\s*([\d.]+)\s*,\s*([\d.\-]+)/);
      if(!m)continue;
      var nameRaw=m[1].trim();
      var parts=nameRaw.split(",");
      var fullName=parts.length>=2?(parts[1].trim().replace(/"/g,"")+" "+parts[0].trim()):nameRaw;
      var pa=parseInt(m[4])||0;
      var ba=parseFloat(m[6])||0;  // BA-against
      var xba=parseFloat(m[7])||0; // xBA-against
      
      if(!fullName||pa<25)continue;
      
      // Estimate K rate: pitchers with lower xBA-against tend to have higher K rates
      // Use PA-based estimation: ~4.2 PA/game for starters, count batters faced
      var gamesEst=pa/25; // ~25 BF per start for starters
      if(gamesEst<1)gamesEst=1;
      
      prates[fullName]={
        xbaAgainst:xba,
        baAgainst:ba,
        pa:pa,
        gamesEst:gamesEst,
      };
      count++;
    }
    console.log("[Diamond Edge] Pitcher Statcast loaded: "+count+" pitchers");
  }catch(e){console.log("[Diamond Edge] Pitcher Statcast error:",e);}
  return prates;
}

async function fetchMLBStandings(){
  // Returns: {teamName: {wins, losses, rs, ra, l10w, l10l, gp}}
  var standings={};
  var year=new Date().getFullYear();
  try{
    var url=MLB_BASE+"/standings?leagueId=103,104&season="+year+"&standingsTypes=regularSeason&hydrate=team";
    var r=await fetch(url);if(!r.ok)return standings;
    var d=await r.json();
    (d.records||[]).forEach(function(div){
      (div.teamRecords||[]).forEach(function(tr){
        var tn2=tr.team?tr.team.name:"";
        var l10=tr.records&&tr.records.splitRecords?tr.records.splitRecords.find(function(s){return s.type==="lastTen"}):null;
        standings[tn2]={
          wins:tr.wins||0,losses:tr.losses||0,
          gp:(tr.wins||0)+(tr.losses||0),
          rs:tr.runsScored||0,ra:tr.runsAllowed||0,
          l10w:l10?l10.wins||0:0,l10l:l10?l10.losses||0:0
        };
      });
    });
    console.log("[Diamond Edge] MLB standings loaded: "+Object.keys(standings).length+" teams");
  }catch(e){console.log("[Diamond Edge] MLB standings error:",e);}
  return standings;
}

async function fetchMLBRecentScores(){
  // Fetch last 10 days of results for run differentials
  // Returns: {teamName: {l10_rd: avg run diff last 10 games, l30_wp: approx}}
  var results={};
  var today=new Date();
  var tenAgo=new Date(today);tenAgo.setDate(tenAgo.getDate()-14); // 14 days covers ~10 games
  try{
    var url=MLB_BASE+"/schedule?sportId=1&startDate="+ds(tenAgo)+"&endDate="+ds(today)+"&gameType=R&hydrate=linescore";
    var r=await fetch(url);if(!r.ok)return results;
    var d=await r.json();
    (d.dates||[]).forEach(function(dt){
      (dt.games||[]).forEach(function(g){
        if(!g.status||g.status.statusCode!=="F")return;
        var ls=g.linescore||{};
        var hRuns=(ls.teams&&ls.teams.home)?ls.teams.home.runs||0:0;
        var aRuns=(ls.teams&&ls.teams.away)?ls.teams.away.runs||0:0;
        var hName=g.teams&&g.teams.home&&g.teams.home.team?g.teams.home.team.name:"";
        var aName=g.teams&&g.teams.away&&g.teams.away.team?g.teams.away.team.name:"";
        [hName,aName].forEach(function(tn2){
          if(!tn2)return;
          if(!results[tn2])results[tn2]={games:[],wins:0};
          var isHome=tn2===hName;
          var myRuns=isHome?hRuns:aRuns;
          var oppRuns=isHome?aRuns:hRuns;
          var won=myRuns>oppRuns?1:0;
          results[tn2].games.push({rd:myRuns-oppRuns,won:won});
          results[tn2].wins+=won;
        });
      });
    });
    // Compute averages
    Object.keys(results).forEach(function(tn2){
      var r2=results[tn2];
      var recent=r2.games.slice(-10);
      r2.l10_rd=recent.length>0?recent.reduce(function(s,g){return s+g.rd},0)/recent.length:0;
      r2.l10_wp=recent.length>=5?recent.reduce(function(s,g){return s+g.won},0)/recent.length:0.5;
      var all=r2.games;
      r2.l30_wp=all.length>=10?all.reduce(function(s,g){return s+g.won},0)/all.length:0.5;
    });
    console.log("[Diamond Edge] Recent scores loaded: "+Object.keys(results).length+" teams");
  }catch(e){console.log("[Diamond Edge] Recent scores error:",e);}
  return results;
}

async function fetchMLBTeamStats(){
  // Pull current-year team stats from MLB Stats API
  var stats={};
  var year=new Date().getFullYear();
  try{
    // Team batting
    var bUrl=MLB_BASE+"/teams/stats?stats=season&group=hitting&season="+year+"&sportIds=1";
    var bR=await fetch(bUrl);
    if(bR.ok){
      var bD=await bR.json();
      ((bD.stats||[])[0]||{}).splits&&((bD.stats||[])[0]).splits.forEach(function(sp){
        var tn2=sp.team?sp.team.name:"";
        var st=sp.stat||{};
        if(!stats[tn2])stats[tn2]={gp:0};
        stats[tn2].OPS=parseFloat(st.ops)||0;
        stats[tn2].gp=parseInt(st.gamesPlayed)||0;
      });
    }
    // Team pitching
    var pUrl=MLB_BASE+"/teams/stats?stats=season&group=pitching&season="+year+"&sportIds=1";
    var pR=await fetch(pUrl);
    if(pR.ok){
      var pD=await pR.json();
      ((pD.stats||[])[0]||{}).splits&&((pD.stats||[])[0]).splits.forEach(function(sp){
        var tn2=sp.team?sp.team.name:"";
        var st=sp.stat||{};
        if(!stats[tn2])stats[tn2]={gp:0};
        stats[tn2].ERA=parseFloat(st.era)||0;
        stats[tn2].BB9=parseFloat(st.baseOnBallsPer9)||0;
      });
    }
    console.log("[Diamond Edge] Team stats loaded: "+Object.keys(stats).length+" teams");
  }catch(e){console.log("[Diamond Edge] Team stats error:",e);}
  return stats;
}

async function fetchSavantTeamBatting(){
  // Pull team-level xwOBA, Barrel%, Exit Velocity from Baseball Savant
  var stats={};
  var year=new Date().getFullYear();
  
  // Savant team abbreviation → full name
  var SAV_NAMES={
    "NYY":"New York Yankees","NYM":"New York Mets","LAD":"Los Angeles Dodgers",
    "ATL":"Atlanta Braves","HOU":"Houston Astros","PHI":"Philadelphia Phillies",
    "BAL":"Baltimore Orioles","SD":"San Diego Padres","MIL":"Milwaukee Brewers",
    "TB":"Tampa Bay Rays","TEX":"Texas Rangers","MIN":"Minnesota Twins",
    "BOS":"Boston Red Sox","SEA":"Seattle Mariners","CLE":"Cleveland Guardians",
    "AZ":"Arizona Diamondbacks","ARI":"Arizona Diamondbacks","CHC":"Chicago Cubs",
    "TOR":"Toronto Blue Jays","SF":"San Francisco Giants","DET":"Detroit Tigers",
    "STL":"St. Louis Cardinals","KC":"Kansas City Royals","CIN":"Cincinnati Reds",
    "LAA":"Los Angeles Angels","PIT":"Pittsburgh Pirates","WSH":"Washington Nationals",
    "MIA":"Miami Marlins","CWS":"Chicago White Sox","OAK":"Oakland Athletics",
    "COL":"Colorado Rockies",
  };
  
  try{
    var savUrl="https://baseballsavant.mlb.com/leaderboard/expected_statistics?type=batter-team&year="+year+"&min=1&csv=true";
    var r=await corsProxyFetch(savUrl);
    if(r&&r.ok){
      var text=await r.text();
      var lines=text.trim().split("\n");
      if(lines.length>=2){
        // Parse header
        var header=lines[0].split(",").map(function(h){return h.trim().replace(/"/g,"").toLowerCase()});
        var nameIdx=header.indexOf("team_name");if(nameIdx<0)nameIdx=header.indexOf("team");if(nameIdx<0)nameIdx=0;
        var xwobaIdx=header.indexOf("est_woba");if(xwobaIdx<0)xwobaIdx=header.indexOf("xwoba");
        var evIdx=header.indexOf("avg_hit_speed");if(evIdx<0)evIdx=header.indexOf("exit_velocity");
        var barrelIdx=header.indexOf("barrel_batted_rate");if(barrelIdx<0)barrelIdx=header.indexOf("brl_percent");
        
        for(var i=1;i<lines.length;i++){
          var cols=lines[i].split(",").map(function(c){return c.trim().replace(/"/g,"")});
          var abbr=cols[nameIdx]||"";
          var fullName=SAV_NAMES[abbr]||abbr;
          if(!fullName)continue;
          if(!stats[fullName])stats[fullName]={};
          if(xwobaIdx>=0)stats[fullName].xwOBA=parseFloat(cols[xwobaIdx])||0;
          if(evIdx>=0)stats[fullName].ev=parseFloat(cols[evIdx])||0;
          if(barrelIdx>=0)stats[fullName].barrel=parseFloat(cols[barrelIdx])||0;
        }
      }
    }
    console.log("[Diamond Edge] Savant team batting loaded: "+Object.keys(stats).length+" teams");
  }catch(e){console.log("[Diamond Edge] Savant team batting error:",e);}
  return stats;
}

function blendStat(live,baseline,key,defaultVal){
  if(!live||!live.gp||live.gp<10)return baseline||defaultVal;
  var w=Math.min(0.95,live.gp/60);
  var lv=live[key];
  if(lv==null||lv===0)return baseline||defaultVal;
  return +((baseline||defaultVal)*(1-w)+lv*w).toFixed(4);
}

// ═══════════════════════════════════════════════════════════
// v11b FEATURE COMPUTATION + MODEL PREDICTION
// ═══════════════════════════════════════════════════════════

function computeFeatures(g){
  // g = game object with all enriched data
  // Returns: feature vector object {f_home, f_pyth, ...}
  var bl_h=MLB_TEAM_BASELINE[g.home]||{wRC:100,OPS:.720,ERA:4.0,FIP:4.0,BB9:3.2,xwOBA:.315,barrel:.07,ev:88};
  var bl_a=MLB_TEAM_BASELINE[g.away]||{wRC:100,OPS:.720,ERA:4.0,FIP:4.0,BB9:3.2,xwOBA:.315,barrel:.07,ev:88};
  var ts=S.mlb.teamStats||{};
  var st=S.mlb.standings||{};
  var rc=S.mlb.recentScores||{};
  var fat=S.mlb.fatigue||{};
  var info=S.mlb.lineups[g.home]||{};

  // Live team stats with baseline blending
  var lh=ts[g.home]||{};var la=ts[g.away]||{};
  var h_ops=blendStat(lh,bl_h.OPS,"OPS",.720);
  var a_ops=blendStat(la,bl_a.OPS,"OPS",.720);

  var h_era=blendStat(lh,bl_h.ERA,"ERA",4.0);
  var a_era=blendStat(la,bl_a.ERA,"ERA",4.0);
  var h_bb9=blendStat(lh,bl_h.BB9,"BB9",3.2);
  var a_bb9=blendStat(la,bl_a.BB9,"BB9",3.2);

  // FanGraphs live: wRC+, FIP (blend with baseline)
  var fg=S.mlb.fangraphs||{};
  var fgh=fg[g.home]||{};var fga=fg[g.away]||{};
  var gp_est=(lh.gp||0);
  var fg_w=gp_est>=10?Math.min(0.95,gp_est/60):0; // Same blend curve
  var h_wrc=fgh.wRC>0?bl_h.wRC*(1-fg_w)+fgh.wRC*fg_w:bl_h.wRC;
  var a_wrc=fga.wRC>0?bl_a.wRC*(1-fg_w)+fga.wRC*fg_w:bl_a.wRC;
  var h_fip=fgh.FIP>0?bl_h.FIP*(1-fg_w)+fgh.FIP*fg_w:bl_h.FIP;
  var a_fip=fga.FIP>0?bl_a.FIP*(1-fg_w)+fga.FIP*fg_w:bl_a.FIP;

  // Savant team batting live: xwOBA, Barrel%, Exit Velocity (blend with baseline)
  var sav=S.mlb.savantTeam||{};
  var savh=sav[g.home]||{};var sava=sav[g.away]||{};
  var h_xwoba=savh.xwOBA>0?bl_h.xwOBA*(1-fg_w)+savh.xwOBA*fg_w:bl_h.xwOBA;
  var a_xwoba=sava.xwOBA>0?bl_a.xwOBA*(1-fg_w)+sava.xwOBA*fg_w:bl_a.xwOBA;
  var h_barrel=savh.barrel>0?bl_h.barrel*(1-fg_w)+savh.barrel*fg_w:bl_h.barrel;
  var a_barrel=sava.barrel>0?bl_a.barrel*(1-fg_w)+sava.barrel*fg_w:bl_a.barrel;
  var h_ev=savh.ev>0?bl_h.ev*(1-fg_w)+savh.ev*fg_w:bl_h.ev;
  var a_ev=sava.ev>0?bl_a.ev*(1-fg_w)+sava.ev*fg_w:bl_a.ev;

  // Standings: Pythagorean, L10
  var sh=st[g.home]||{};var sa=st[g.away]||{};
  var h_pyth=pythWP(sh.rs||bl_h.wRC*4,sh.ra||bl_h.ERA*150);
  var a_pyth=pythWP(sa.rs||bl_a.wRC*4,sa.ra||bl_a.ERA*150);

  // Recent form
  var rh=rc[g.home]||{};var ra2=rc[g.away]||{};
  var h_l10=rh.l10_wp!=null?rh.l10_wp:(sh.gp>0?(sh.l10w/(sh.l10w+sh.l10l)||0.5):0.5);
  var a_l10=ra2.l10_wp!=null?ra2.l10_wp:(sa.gp>0?(sa.l10w/(sa.l10w+sa.l10l)||0.5):0.5);
  var h_l30=rh.l30_wp!=null?rh.l30_wp:(sh.gp>0?sh.wins/sh.gp:0.5);
  var a_l30=ra2.l30_wp!=null?ra2.l30_wp:(sa.gp>0?sa.wins/sa.gp:0.5);
  var h_l10_rd=rh.l10_rd||0;
  var a_l10_rd=ra2.l10_rd||0;

  // Starting pitcher Statcast — v11d blending:
  //   Prior-year Statcast as baseline, blend in current-year as PA grows
  //   < 25 PA current year → 100% prior year
  //   25-100 PA → linear blend
  //   100+ PA → 100% current year
  var psc=S.mlb.pitcherStatcast||{};
  
  function blendSC(pitcherName){
    var sc=psc[pitcherName];
    if(!sc)return {}; // No Statcast at all — defaults will be used
    // Current-year Statcast data from Savant
    // Estimate how far into season: PA available now
    var pa=sc.pa||0;
    // The Savant CSV we fetch is always current-year
    // xERA estimate from xBA-against
    var cur_xera=sc.xbaAgainst?3.2+(sc.xbaAgainst-0.240)*40:null;
    var cur_xwoba=sc.xbaAgainst?sc.xbaAgainst*1.3+0.010:null;
    // For prior-year, we use defaults (the model was trained on prior-year, so defaults ARE the prior)
    // When current-year PA is low, lean toward defaults (prior-year proxy)
    if(pa<25||cur_xera==null)return {}; // Not enough data, use defaults
    if(pa>=100)return {xERA:cur_xera,xwOBA:cur_xwoba||0.320,pa:pa};
    // Blend: default values are the "prior-year" stand-in
    var w=(pa-25)/75;
    return{
      xERA:4.2*(1-w)+cur_xera*w,
      xwOBA:0.320*(1-w)+(cur_xwoba||0.320)*w,
      pa:pa
    };
  }
  
  var hsp=blendSC(info.homePitcher);
  var asp=blendSC(info.awayPitcher);
  // xERA estimate from xBA-against: xERA ≈ 3.2 + (xBA - 0.240) * 40
  var h_sp_xera=hsp.xbaAgainst?3.2+(hsp.xbaAgainst-0.240)*40:bl_h.ERA;
  var a_sp_xera=asp.xbaAgainst?3.2+(asp.xbaAgainst-0.240)*40:bl_a.ERA;
  // xwOBA estimate from xBA: xwOBA ≈ xBA * 1.3 + 0.010
  var h_sp_xwoba=hsp.xbaAgainst?hsp.xbaAgainst*1.3+0.010:0.320;
  var a_sp_xwoba=asp.xbaAgainst?asp.xbaAgainst*1.3+0.010:0.320;
  var h_sp_pa=hsp.pa||500;
  var a_sp_pa=asp.pa||500;

  // Bullpen ERA proxy: team_ERA = 0.55*SP_ERA + 0.45*pen_ERA → pen = (team - 0.55*sp) / 0.45
  var h_sp_era_est=h_sp_xera;var a_sp_era_est=a_sp_xera;
  var h_pen=Math.max(2,Math.min(7,(h_era-0.55*h_sp_era_est)/0.45));
  var a_pen=Math.max(2,Math.min(7,(a_era-0.55*a_sp_era_est)/0.45));

  // Fatigue / rest / schedule
  var hf=fat[g.home]||{games:0,minRest:3};
  var af=fat[g.away]||{games:0,minRest:3};
  var h_rest=hf.minRest||3;var a_rest=af.minRest||3;
  var h_g3=hf.games||0;var a_g3=af.games||0;

  // Travel (away team timezone crossings)
  var h_tz=MLB_TZ[g.home]||1;
  var a_tz=MLB_TZ[g.away]||1;
  var travel=Math.abs(h_tz-a_tz);

  // Park factor
  var park=PARK_FACTORS[g.home]||1.0;

  // ── Build feature vector ──
  return {
    f_home:       1.0,
    f_pyth:       h_pyth-a_pyth,
    f_l10:        h_l10-a_l10,
    f_l30:        h_l30-a_l30,
    f_l10_rd:     (h_l10_rd-a_l10_rd)/5,
    f_wrc:        (h_wrc-a_wrc)/100,
    f_ops:        h_ops-a_ops,
    f_xwoba_bat:  h_xwoba-a_xwoba,
    f_barrel:     h_barrel-a_barrel,
    f_ev:         (h_ev-a_ev)/10,
    f_era:        a_era-h_era,  // Positive = home has better pitching
    f_fip:        a_fip-h_fip,
    f_bb9:        (a_bb9-h_bb9)/3,
    f_sp_xera:    (a_sp_xera-h_sp_xera)/2,
    f_sp_xwoba:   (a_sp_xwoba-h_sp_xwoba)*5,
    f_matchup:    (a_sp_xwoba*h_wrc/100)-(h_sp_xwoba*a_wrc/100),
    f_pen:        (a_pen-h_pen)/2,
    f_park:       park,
    f_rest_diff:  Math.min(3,(h_rest-a_rest))/3,
    f_sched:      (a_g3-h_g3)/3,
    f_travel:     travel/3,
    f_sp_x_bat:   ((a_sp_xera-h_sp_xera)/2)*((h_wrc-a_wrc)/100),
    f_pen_x_sched:((a_pen-h_pen)/3)*((a_g3-h_g3)/3),
    f_form_x_rd:  (h_l10-a_l10)*((h_l10_rd-a_l10_rd)/5)
  };
}

function predictV11b(features){
  // Run sigmoid(weights · features + bias)
  var z=V11B_MODEL.bias;
  V11B_MODEL.features.forEach(function(fname){
    var w=V11B_MODEL.weights[fname]||0;
    var x=features[fname]||0;
    z+=w*x;
  });
  return sigmoid(z);
}

// ── Weather → Model Adjustment ──
function calcWeatherAdj(wx){
  if(!wx||wx.indoor)return{totalAdj:0,mlAdj:0,desc:"Dome — no adjustment"};
  var totalAdj=0;var desc=[];
  if(wx.temp>70){
    totalAdj+=(wx.temp-70)/10*0.3;
    desc.push("🌡 "+wx.temp+"°F: +"+(((wx.temp-70)/10*0.3).toFixed(1))+" runs");
  }else if(wx.temp<55){
    totalAdj-=(55-wx.temp)/10*0.2;
    desc.push("🥶 "+wx.temp+"°F: "+(((55-wx.temp)/10*-0.2).toFixed(1))+" runs");
  }
  if(wx.wind>=15){totalAdj+=0.5;desc.push("🌬 "+wx.wind+"mph: +0.5 runs");}
  var mlAdj=totalAdj*0.008;
  return{totalAdj:+totalAdj.toFixed(1),mlAdj:+mlAdj.toFixed(3),desc:desc.join(" · ")||"Neutral"};
}

// ── Umpire → Model Adjustment ──
function calcUmpAdj(umpTendency,homePitchAdv){
  if(umpTendency==="high"){
    var adj=homePitchAdv>0?0.015:-0.015;
    return{mlAdj:adj,desc:"⬆️ High-K ump: "+(adj>0?"+":"")+((adj*100).toFixed(1))+"% to pitching side"};
  }else if(umpTendency==="low"){
    var adj2=homePitchAdv>0?-0.008:0.008;
    return{mlAdj:adj2,desc:"⬇️ Low-K ump: "+(adj2>0?"+":"")+((adj2*100).toFixed(1))+"% to hitting side"};
  }
  return{mlAdj:0,desc:"Neutral ump"};
}

// ═══════════════════════════════════════════════════════════
// ENRICH MLB GAMES — compute features, run model, set edges
// ═══════════════════════════════════════════════════════════

function enrichMLBGames(games){
  return games.map(function(g){
    var info=S.mlb.lineups[g.home]||{};
    var wx=S.mlb.weather[g.home];

    // ── Run v11b model ──
    var features=computeFeatures(g);
    var modelProb=predictV11b(features); // P(home win)
    g.modelProb=+modelProb.toFixed(4);
    g.features=features;

    // Weather post-adjustment
    var wxAdj=calcWeatherAdj(wx);
    g.wxTotalAdj=wxAdj.totalAdj;
    g.wxMLAdj=wxAdj.mlAdj;
    g.wxDesc=wxAdj.desc;

    // Umpire post-adjustment
    var homePitchAdv=features.f_era; // positive = home better pitching
    var umpAdj=calcUmpAdj(info.umpTendency||"neutral",homePitchAdv);
    g.umpMLAdj=umpAdj.mlAdj;
    g.umpDesc=umpAdj.desc;

    // Apply post-model adjustments
    var adjProb=Math.min(0.80,Math.max(0.20,modelProb+wxAdj.mlAdj+umpAdj.mlAdj));
    g.modelFairH=+(adjProb*100).toFixed(1);
    g.modelFairA=+(100-g.modelFairH).toFixed(1);

    // Calculate edges: model probability vs best available book odds
    g.modelHEdge=+((1/ml2p(g.bestHML))*(g.modelFairH/100)*100-100).toFixed(1);
    g.modelAEdge=+((1/ml2p(g.bestAML))*(g.modelFairA/100)*100-100).toFixed(1);
    g.modelTopEdge=Math.max(g.modelHEdge,g.modelAEdge);
    g.modelBetSide=g.modelTopEdge>3?(g.modelHEdge>=g.modelAEdge?"HOME":"AWAY"):null;

    // Team stats for display
    var ts=S.mlb.teamStats||{};
    g.homeStats=ts[g.home]||null;
    g.awayStats=ts[g.away]||null;

    return g;
  });
}


function processOdds(apiData){
  var now=new Date();
  return apiData.map(function(ev){
    var gt=new Date(ev.commence_time);
    if(gt<now)return null;
    var home=ev.home_team,away=ev.away_team;
    var bd={},hMLs=[],aMLs=[],tots=[];
    (ev.bookmakers||[]).forEach(function(bm){
      var pa=PA.find(function(b){return b.key===bm.key});
      if(!pa)return;
      var hml=null,aml=null,tot=null,hSpread=null,hSpreadOdds=null,aSpread=null,aSpreadOdds=null;
      (bm.markets||[]).forEach(function(mkt){
        if(mkt.key==="h2h")mkt.outcomes.forEach(function(o){
          if(o.name===home)hml=o.price;if(o.name===away)aml=o.price;
        });
        if(mkt.key==="totals")mkt.outcomes.forEach(function(o){
          if(o.name==="Over")tot=o.point;
        });
        if(mkt.key==="spreads")mkt.outcomes.forEach(function(o){
          if(o.name===home){hSpread=o.point;hSpreadOdds=o.price;}
          if(o.name===away){aSpread=o.point;aSpreadOdds=o.price;}
        });
      });
      bd[pa.id]={homeML:hml,awayML:aml,total:tot,hSpread:hSpread,hSpreadOdds:hSpreadOdds,aSpread:aSpread,aSpreadOdds:aSpreadOdds};
      if(hml!=null)hMLs.push(hml);if(aml!=null)aMLs.push(aml);if(tot!=null)tots.push(tot);
    });
    if(!hMLs.length)return null;
    var hPs=hMLs.map(ml2p),aPs=aMLs.map(ml2p);
    var avgH=hPs.reduce(function(a,b){return a+b},0)/hPs.length;
    var avgA=aPs.reduce(function(a,b){return a+b},0)/aPs.length;
    var tp=avgH+avgA;
    var fairH=+(avgH/tp*100).toFixed(1),fairA=+(avgA/tp*100).toFixed(1);
    var bestHML=Math.max.apply(null,hMLs),bestAML=Math.max.apply(null,aMLs);
    var bestHB=null,bestAB=null;
    Object.keys(bd).forEach(function(k){if(bd[k].homeML===bestHML)bestHB=k;if(bd[k].awayML===bestAML)bestAB=k});
    var conTot=tots.length?+(tots.reduce(function(a,b){return a+b},0)/tots.length).toFixed(1):null;
    var loTot=tots.length?Math.min.apply(null,tots):null;
    var hiTot=tots.length?Math.max.apply(null,tots):null;
    var hEdge=+((1/ml2p(bestHML))*(fairH/100)*100-100).toFixed(1);
    var aEdge=+((1/ml2p(bestAML))*(fairA/100)*100-100).toFixed(1);
    var topEdge=Math.max(hEdge,aEdge);
    var betSide=topEdge>3?(hEdge>=aEdge?"HOME":"AWAY"):null;

    // Find best puck line / run line
    var bestHSpreadOdds=-999,bestASpreadOdds=-999,bestHSpreadBook=null,bestASpreadBook=null;
    var plSpread=null;
    Object.keys(bd).forEach(function(k){
      var d=bd[k];
      if(d.hSpreadOdds!=null&&d.hSpreadOdds>bestHSpreadOdds){bestHSpreadOdds=d.hSpreadOdds;bestHSpreadBook=k;plSpread=d.hSpread;}
      if(d.aSpreadOdds!=null&&d.aSpreadOdds>bestASpreadOdds){bestASpreadOdds=d.aSpreadOdds;bestASpreadBook=k;if(!plSpread)plSpread=d.aSpread;}
    });

    return{id:ev.id,home:home,away:away,time:ev.commence_time,
      fairH:fairH,fairA:fairA,bestHML:bestHML,bestAML:bestAML,bestHB:bestHB,bestAB:bestAB,
      hEdge:hEdge,aEdge:aEdge,topEdge:topEdge,betSide:betSide,
      conTot:conTot,loTot:loTot,hiTot:hiTot,bd:bd,
      plSpread:plSpread,bestHSpreadOdds:bestHSpreadOdds>-999?bestHSpreadOdds:null,
      bestASpreadOdds:bestASpreadOdds>-999?bestASpreadOdds:null,
      bestHSpreadBook:bestHSpreadBook,bestASpreadBook:bestASpreadBook};
  }).filter(function(g){return g!=null});
}

// ═══════════════════════════════════════════════════════════
// NHL MODEL — Apply context adjustments to edge calculation
// ═══════════════════════════════════════════════════════════
// Model factors (weights based on NHL betting research):
//   rest_advantage: 0.25 — biggest documented edge
//   goalie_factor:  0.20 — goalie swaps move lines 20-30¢
//   form_l10:       0.20 — last-10 record as momentum proxy
//   special_teams:  0.15 — PP/PK mismatch
//   home_ice:       0.10 — ~2-3% baseline advantage
//   travel:         0.10 — cross-timezone penalty

function enrichNHLGames(games){
  var sched=S.nhl.schedule||{};
  var standings=S.nhl.standings||{};
  var fatigue=S.nhl.fatigue||{};

  return games.map(function(g){
    var hAbbr=NHL_ABBREVS[g.home]||"";
    var aAbbr=NHL_ABBREVS[g.away]||"";

    // Schedule context
    var schedInfo=sched[hAbbr]||{};
    g.homeGoalie=schedInfo.homeGoalie||null;
    g.awayGoalie=schedInfo.awayGoalie||null;
    g.homeGoalieConfirmed=schedInfo.homeGoalieConfirmed||false;
    g.awayGoalieConfirmed=schedInfo.awayGoalieConfirmed||false;

    // Fatigue / B2B
    var hFat=fatigue[hAbbr]||{b2b:false,restDays:99,gamesIn3Days:0};
    var aFat=fatigue[aAbbr]||{b2b:false,restDays:99,gamesIn3Days:0};
    g.homeB2B=hFat.b2b;
    g.awayB2B=aFat.b2b;
    g.homeRest=hFat.restDays;
    g.awayRest=aFat.restDays;
    g.homeGamesIn3=hFat.gamesIn3Days;
    g.awayGamesIn3=aFat.gamesIn3Days;
    g.restDiff=aFat.restDays-hFat.restDays; // positive = home more rested

    // Standings context
    var hStand=standings[hAbbr]||{};
    var aStand=standings[aAbbr]||{};
    g.homeRecord=(hStand.wins||0)+"-"+(hStand.losses||0)+"-"+(hStand.otl||0);
    g.awayRecord=(aStand.wins||0)+"-"+(aStand.losses||0)+"-"+(aStand.otl||0);
    g.homeL10=(hStand.l10W||0)+"-"+(hStand.l10L||0)+"-"+(hStand.l10OTL||0);
    g.awayL10=(aStand.l10W||0)+"-"+(aStand.l10L||0)+"-"+(aStand.l10OTL||0);
    g.homeStreak=(hStand.streak||"")+(hStand.streakCount||"");
    g.awayStreak=(aStand.streak||"")+(aStand.streakCount||"");
    g.homeGD=hStand.goalDiff||0;
    g.awayGD=aStand.goalDiff||0;
    g.homePts=hStand.points||0;
    g.awayPts=aStand.points||0;

    // Travel factor
    var hTz=NHL_TZ[hAbbr]||0;
    var aTz=NHL_TZ[aAbbr]||0;
    g.tzDiff=Math.abs(hTz-aTz);

    // ── NHL Edge Adjustment ──
    // Start with market-derived edge, then layer context signals
    var contextAdj=0;
    var signals=[];

    // Back-to-back penalty (~2% disadvantage)
    if(g.awayB2B&&!g.homeB2B){
      contextAdj+=2.0;
      signals.push({icon:"🔴",text:g.away+" on B2B ("+g.awayRest+"d rest) — fade away",type:"boost"});
    }
    if(g.homeB2B&&!g.awayB2B){
      contextAdj-=2.0;
      signals.push({icon:"🔴",text:g.home+" on B2B ("+g.homeRest+"d rest) — fade home",type:"fade"});
    }
    if(g.homeB2B&&g.awayB2B){
      signals.push({icon:"🟡",text:"Both teams on B2B — fatigue wash",type:"neutral"});
    }

    // Rest advantage (beyond B2B)
    if(!g.homeB2B&&!g.awayB2B){
      if(g.homeRest>=3&&g.awayRest<=1){
        contextAdj+=1.5;
        signals.push({icon:"💤",text:g.home+" well-rested ("+g.homeRest+"d) vs "+g.away+" ("+g.awayRest+"d)",type:"boost"});
      }else if(g.awayRest>=3&&g.homeRest<=1){
        contextAdj-=1.5;
        signals.push({icon:"💤",text:g.away+" well-rested ("+g.awayRest+"d) vs "+g.home+" ("+g.homeRest+"d)",type:"fade"});
      }
    }

    // Travel penalty (cross-timezone away team)
    if(g.tzDiff>=2&&g.awayRest<=1){
      contextAdj+=1.0;
      signals.push({icon:"✈️",text:g.away+" crossed "+g.tzDiff+" time zones on short rest",type:"boost"});
    }

    // Heavy schedule (3+ games in 3 days)
    if(g.awayGamesIn3>=3){
      contextAdj+=0.5;
      signals.push({icon:"📅",text:g.away+" heavy schedule ("+g.awayGamesIn3+" games in 3 days)",type:"boost"});
    }
    if(g.homeGamesIn3>=3){
      contextAdj-=0.5;
      signals.push({icon:"📅",text:g.home+" heavy schedule ("+g.homeGamesIn3+" games in 3 days)",type:"fade"});
    }

    // Goalie not confirmed (uncertainty flag)
    if(!g.homeGoalieConfirmed&&!g.awayGoalieConfirmed){
      signals.push({icon:"🥅",text:"Goalies TBD — check morning skate",type:"neutral"});
    }

    if(!signals.length){
      signals.push({icon:"📊",text:"No strong situational signals",type:"neutral"});
    }

    g.contextAdj=+contextAdj.toFixed(1);
    g.adjEdge=+(g.topEdge+contextAdj).toFixed(1);
    g.signals=signals;

    // Re-evaluate bet side with context
    var adjHEdge=+(g.hEdge+(contextAdj>0?contextAdj:0)).toFixed(1);
    var adjAEdge=+(g.aEdge-(contextAdj>0?0:contextAdj)).toFixed(1);
    g.adjBetSide=g.adjEdge>3?(adjHEdge>=adjAEdge?"HOME":"AWAY"):null;

    // ── BACKTESTED: B2B + CLV Stacking (22,991 games) ──
    // When opponent is on B2B AND model has CLV edge → premium signal
    // Test data: +21.8% ROI at 3%+, +32.1% at 5%+, +81.8% at 10%+
    g.b2bStack=false;
    g.b2bStackSide=null;
    if(g.awayB2B&&!g.homeB2B&&g.hEdge>0){
      g.b2bStack=true;g.b2bStackSide="HOME";
    }else if(g.homeB2B&&!g.awayB2B&&g.aEdge>0){
      g.b2bStack=true;g.b2bStackSide="AWAY";
    }

    return g;
  });
}

async function loadMLB(){
  S.mlb.loading=true;S.mlb.error=null;syncActive();render();
  try{
    var results=await Promise.allSettled([
      fetchMLBOdds(),fetchMLBSchedule(),fetchMLBFatigue(),
      fetchMLBTeamStats(),fetchMLBStandings(),fetchMLBRecentScores(),
      fetchStatcastPitcherRates(),fetchFanGraphsTeamStats(),fetchSavantTeamBatting()
    ]);
    if(results[0].status==="fulfilled"){S.mlb.games=processOdds(results[0].value||[]);}
    else{S.mlb.error=results[0].reason?results[0].reason.message:"Failed";S.mlb.games=[];}
    if(results[1].status==="fulfilled")S.mlb.lineups=results[1].value||{};
    if(results[2].status==="fulfilled")S.mlb.fatigue=results[2].value||{};
    if(results[3].status==="fulfilled")S.mlb.teamStats=results[3].value||{};
    if(results[4].status==="fulfilled")S.mlb.standings=results[4].value||{};
    if(results[5].status==="fulfilled")S.mlb.recentScores=results[5].value||{};
    if(results[6].status==="fulfilled")S.mlb.pitcherStatcast=results[6].value||{};
    if(results[7].status==="fulfilled")S.mlb.fangraphs=results[7].value||{};
    if(results[8].status==="fulfilled")S.mlb.savantTeam=results[8].value||{};
    S.mlb.games.forEach(function(g){
      if(!S.mlb.weather[g.home]){
        fetchWeather(g.home).then(function(w){if(w){S.mlb.weather[g.home]=w;S.mlb.games=enrichMLBGames(S.mlb.games);syncActive();render()}});
      }
    });
    // Apply v11b model enrichment
    S.mlb.games=enrichMLBGames(S.mlb.games);
    S.mlb.lastFetch=new Date();
  }catch(e){S.mlb.error=e.message;S.mlb.games=[];}
  S.mlb.loading=false;syncActive();render();
}

async function loadNHL(){
  S.nhl.loading=true;S.nhl.error=null;syncActive();render();
  try{
    var results=await Promise.allSettled([fetchNHLOdds(),fetchNHLSchedule(),fetchNHLStandings(),fetchNHLFatigue()]);
    if(results[0].status==="fulfilled"){
      S.nhl.games=processOdds(results[0].value||[]);
    }else{
      S.nhl.error=results[0].reason?results[0].reason.message:"Failed to load NHL odds";
      S.nhl.games=[];
    }
    if(results[1].status==="fulfilled")S.nhl.schedule=results[1].value||{};
    if(results[2].status==="fulfilled")S.nhl.standings=results[2].value||{};
    if(results[3].status==="fulfilled")S.nhl.fatigue=results[3].value||{};

    // Enrich games with NHL model context
    S.nhl.games=enrichNHLGames(S.nhl.games);
    S.nhl.lastFetch=new Date();
  }catch(e){S.nhl.error=e.message;S.nhl.games=[];}
  S.nhl.loading=false;syncActive();render();
  // Fetch bet365 odds async (doesn't block main load)
}

function syncActive(){
  if(S.league==="bets"){
    S.games=[];S.loading=false;S.error=null;S.lastFetch=null;
    return;
  }
  var ld=S[S.league]||{};
  S.games=ld.games||[];
  S.loading=ld.loading||false;
  S.error=ld.error||null;
  S.lastFetch=ld.lastFetch||null;
}

function loadCurrent(){
  if(S.league==="mlb")loadMLB();
  else if(S.league==="nhl")loadNHL();
}

async function refreshAll(){
  S.mlb.lastFetch=null;S.nhl.lastFetch=null;
  syncActive();render();

  // Load both sports in parallel
  await Promise.allSettled([loadMLB(),loadNHL()]);

  render();
}

function toggleBook(id){
  S.booksOn[id]=!S.booksOn[id];
  try{localStorage.setItem("de_books",JSON.stringify(S.booksOn));}catch(e){}
  render();
}

function switchLeague(key){
  S.league=key;
  if(key==="bets"){S.tab="bets";}
  else{S.tab="ml";S.expanded={};}
  syncActive();
  if(key!=="bets"){
    var ld=S[key]||{};
    if(!ld.lastFetch&&!ld.loading)loadCurrent();
    else render();
  }else{
    // Load both leagues if not loaded
    if(!S.nhl.lastFetch&&!S.nhl.loading)loadNHL();
    if(!S.mlb.lastFetch&&!S.mlb.loading)loadMLB();
    render();
  }
}

      var dogFairProb=homeFav?useFairA:useFairH;

      // v11d: ONLY Dog +1.5 is profitable. Fav -1.5 killed (negative at all thresholds)
      // Dog +1.5: BET at 8%+ edge (65% cover, +8.8% ROI), WATCH at 5%+
      var rlDogBet=!isNHL&&favEdge>=8&&dogSpread!=null&&dogSpread>0;
      var rlDogWatch=!isNHL&&favEdge>=5&&favEdge<8&&dogSpread!=null&&dogSpread>0;

      // Tags
      var tagH="";
      if(rlDogBet)tagH='<span class="tag tag-e" style="background:rgba(0,201,255,.1);color:var(--ac2);border-color:rgba(0,201,255,.2)">DOG +1.5 BET</span>';
      else if(rlDogWatch)tagH='<span class="tag tag-w">DOG +1.5 WATCH</span>';
      if(isNHL){
        if(g.homeB2B)tagH+=' <span class="tag tag-b2b">HOME B2B</span>';
        if(g.awayB2B)tagH+=' <span class="tag tag-b2b">AWAY B2B</span>';
      }

      // +EV filter: only show games with signals
      if(S.evOnly&&!rlDogBet&&!rlDogWatch)return;

      h+='<div class="pl-card"><div class="gh">';
      h+='<div style="flex:1 1 180px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">';
      h+='<span class="tm sg">'+g.away+'</span><span class="at">@</span><span class="tm sg">'+g.home+'</span> '+tagH;
      h+='</div>';
      h+='<div class="mono" style="font-size:10px;color:var(--td)">'+fd(g.time)+' · '+ft(g.time)+'</div>';
      if(isNHL&&(g.homeGoalie||g.awayGoalie)){
        h+='<div style="font-size:10px;color:var(--tm);margin-top:2px">🥅 '+(g.awayGoalie||"TBD")+' vs '+(g.homeGoalie||"TBD")+'</div>';
      }
      // v11c: Show model adjustments
      if(!isNHL){
        var adjItems=[];
        if(g.wxTotalAdj&&g.wxTotalAdj!==0)adjItems.push(g.wxDesc);
        if(g.umpMLAdj&&g.umpMLAdj!==0)adjItems.push(g.umpDesc);
        adjItems.push("📊 v11d model");
        if(adjItems.length){
          h+='<div style="font-size:9px;color:var(--ac2);margin-top:3px">'+adjItems.join(' · ')+'</div>';
        }
      }
      h+='</div>';

      // Spread display
      h+='<div style="text-align:center;min-width:100px"><div class="sh">'+plLabel+'</div>';
      h+='<div style="display:flex;gap:16px;justify-content:center;align-items:center">';
      h+='<div><div class="sh">'+g.away+'</div>';
      h+='<div class="pl-spread '+(aSpreadShow>0?"pl-dog":"pl-fav")+'">'+(aSpreadShow!=null?(aSpreadShow>0?"+":"")+aSpreadShow:"—")+'</div></div>';
      h+='<div><div class="sh">'+g.home+'</div>';
      h+='<div class="pl-spread '+(hSpreadShow>0?"pl-dog":"pl-fav")+'">'+(hSpreadShow!=null?(hSpreadShow>0?"+":"")+hSpreadShow:"—")+'</div></div>';
      h+='</div></div>';

      // Best odds (active books)
      h+='<div style="text-align:center;min-width:120px"><div class="sh">Best Spread Odds</div>';
      h+='<div style="display:flex;gap:14px;justify-content:center">';
      h+='<div><div class="sh">Away</div><div class="mono" style="font-size:14px;font-weight:700;color:var(--tx)">'+fml(actBestASO>-9999?actBestASO:null)+'</div></div>';
      h+='<div><div class="sh">Home</div><div class="mono" style="font-size:14px;font-weight:700;color:var(--tx)">'+fml(actBestHSO>-9999?actBestHSO:null)+'</div></div>';
      h+='</div></div>';

      // Fav edge display
      h+='<div style="text-align:center;min-width:80px"><div class="sh">Fav Edge</div>';
      var edgeCls=favEdge>=12?"ev-p":favEdge>=8?"ev-p":"ev-0";
      h+='<div class="ev '+edgeCls+'">'+(favEdge>0?"+":"")+favEdge+'%</div>';
      h+='<div style="font-size:9px;color:var(--td);margin-top:2px">'+favTeam+'</div>';
      h+='</div>';

      h+='</div>';

      // ── v11d: DOG +1.5 ONLY (fav -1.5 killed — negative at all thresholds) ──
      if(rlDogBet&&dogBook&&dogOdds!=null){
        h+='<div class="bet-rec" style="margin-top:0;border-top:none;border-top-left-radius:0;border-top-right-radius:0;background:rgba(0,201,255,.07);border-color:rgba(0,201,255,.25)">';
        h+='<div><div class="bet-label" style="color:var(--ac2)">v11d Dog +1.5 BET</div><div class="bet-team" style="font-size:14px;color:var(--ac2)">'+dogTeam+' +1.5</div></div>';
        h+='<div><div class="bet-label">Odds</div><div class="bet-line" style="font-size:16px">'+fml(dogOdds)+'</div></div>';
        h+='<div><div class="bet-label">Book</div><div class="bet-book" style="color:var(--ac2);background:rgba(0,201,255,.1)">'+dogBook.n+'</div></div>';
        h+='<div><div class="bet-label">Fav Edge</div><div class="bet-edge" style="color:var(--ac2)">+'+favEdge+'%</div></div>';
        h+='<div style="font-size:9px;color:var(--td)">65% cover @ 8%+ · ROI +8.8% · Covers if dog wins OR loses by 1</div>';
        h+='</div>';
      }else if(rlDogWatch&&dogBook&&dogOdds!=null){
        h+='<div class="bet-watch" style="margin-top:0;border-top:none;border-top-left-radius:0;border-top-right-radius:0">';
        h+='<div><div class="bet-label">Watch Dog +1.5</div><div class="bet-team" style="font-size:13px">'+dogTeam+' +1.5</div></div>';
        h+='<div class="bet-line">'+fml(dogOdds)+'</div>';
        h+='<div class="bet-book">@ '+dogBook.n+'</div>';
        h+='<div style="font-size:11px;color:var(--warn);font-weight:700;font-family:\'JetBrains Mono\',monospace">+'+favEdge+'%</div>';
        h+='<div style="font-size:9px;color:var(--td)">Below 8% BET threshold (monitoring)</div>';
        h+='</div>';
      }else if(favEdge<5){
        h+='<div style="margin-top:0;padding:6px 12px;font-size:10px;color:var(--td);background:var(--alt);border:1px solid var(--bdL);border-top:none;border-radius:0 0 8px 8px">';
        h+='No '+plLabel+' signal — fav edge +'+favEdge+'% is below 5% threshold.';
        h+='</div>';
      }

      // Book spread lines
      var vb=ab.filter(function(bk){return g.bd[bk.id]&&g.bd[bk.id].hSpread!=null});
      if(vb.length){
        h+='<div class="blr">';
        vb.forEach(function(bk){
          var d=g.bd[bk.id];
          var isBH=actHSBook&&bk.id===actHSBook.id;
          var isBA=actASBook&&bk.id===actASBook.id;
          h+='<div class="bl'+((isBA||isBH)?" best":"")+'" style="min-width:100px"><div class="bln">'+bk.n+'</div>';
          h+='<div style="display:flex;gap:4px;justify-content:center;font-size:10px;font-weight:700;font-family:\'JetBrains Mono\',monospace;flex-direction:column;line-height:1.4">';
          h+='<div><span style="color:var(--td);font-size:9px">'+g.away+'</span> <span style="color:'+(isBA?"var(--acc)":"var(--tx)")+'">'+(d.aSpread>0?"+":"")+d.aSpread+' ('+fml(d.aSpreadOdds)+')</span></div>';
          h+='<div><span style="color:var(--td);font-size:9px">'+g.home+'</span> <span style="color:'+(isBH?"var(--acc)":"var(--tx)")+'">'+(d.hSpread>0?"+":"")+d.hSpread+' ('+fml(d.hSpreadOdds)+')</span></div>';
          h+='</div></div>';
        });
        h+='</div>';
      }
      h+='</div>';
    });

    if(!games.length||!games.some(function(g){var has=false;abAll.forEach(function(bk){if(g.bd[bk.id]&&g.bd[bk.id].hSpread!=null)has=true;});return has;})){
      h+='<div class="empty"><div class="empty-i">'+(isNHL?"🏒":"⚾")+'</div><div class="empty-t sg">No '+plLabel+' Data Available</div>';
      h+='<div class="empty-d">'+plLabel+' odds ('+plSpreadVal+') will appear once books post spread lines for upcoming games.</div></div>';
    }
  }

  // ═══ OVER/UNDER TAB ═══
  else if(S.tab==="ou"){
    if(isNHL){
      h+='<div class="ib"><span style="font-size:14px">ℹ️</span>NHL totals typically range 5.5-6.5. Totals shown for reference — the O/U market is efficient. Use line disagreements between books for context.</div>';
    }else{
      h+='<div class="ib"><span style="font-size:14px">ℹ️</span>Totals for reference — O/U market is too efficient for model bets. Line disagreements between books shown below.</div>';
    }
    games.filter(function(g){return g.conTot!=null}).forEach(function(g){
      // Calculate best over/under from ALL books
      var actLoTot=999,actHiTot=0,actTots=[];
      var actBestOverBook=null,actBestUnderBook=null,actLoTotBook=null,actHiTotBook=null;
      abAll.forEach(function(bk){
        var d=g.bd[bk.id];if(!d||d.total==null)return;
        actTots.push(d.total);
        if(d.total<actLoTot){actLoTot=d.total;actLoTotBook=bk;}
        if(d.total>actHiTot){actHiTot=d.total;actHiTotBook=bk;}
      });
      var actConTot=actTots.length?+(actTots.reduce(function(a,b){return a+b},0)/actTots.length).toFixed(1):g.conTot;
      var spread=actTots.length>=2?(actHiTot-actLoTot):0;

      var tagH=spread>=0.5?'<span class="tag tag-i">LINE DIFF</span>':"";
      h+='<div class="gc"><div class="gh">';
      h+='<div style="flex:1 1 180px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span class="tm sg">'+g.away+' @ '+g.home+'</span> '+tagH+'</div>';
      h+='<div class="mono" style="font-size:10px;color:var(--td)">'+fd(g.time)+' · '+ft(g.time)+'</div></div>';
      h+='<div style="display:flex;gap:20px;align-items:center">';
      h+='<div style="text-align:center"><div class="sh">Consensus</div><div class="mono" style="font-size:22px;font-weight:800">'+actConTot+'</div></div>';
      if(actTots.length>=2){
        h+='<div style="text-align:center"><div class="sh">Range</div><div class="mono" style="font-size:16px;font-weight:700;color:var(--tm)">'+actLoTot+'–'+actHiTot+'</div></div>';
        h+='<div style="text-align:center"><div class="sh">Spread</div><div class="mono" style="font-size:14px;font-weight:700;color:'+(spread>=0.5?"var(--acc)":"var(--td)")+'">'+spread.toFixed(1)+'</div></div>';
      }
      h+='</div></div>';

      // ── O/U BEST LINE RECOMMENDATION ──
      // When books disagree, the outlier book has value
      // If one book has a lower total → that's the best Over (fewer goals needed)
      // If one book has a higher total → that's the best Under (more goals needed)
      if(spread>=0.5&&actLoTotBook&&actHiTotBook){
        // Determine which direction has more value: 
        // Count books above vs below consensus
        var aboveCount=0,belowCount=0;
        actTots.forEach(function(t){if(t>actConTot)aboveCount++;if(t<actConTot)belowCount++;});
        
        // If most books are high and one is low → that low book has Over value
        // If most books are low and one is high → that high book has Under value
        var bestDir,bestTotal,bestBook,reason;
        if(belowCount<=aboveCount){
          // Outlier is LOW → Over value (you're getting a lower line than consensus)
          bestDir="OVER";bestTotal=actLoTot;bestBook=actLoTotBook;
          reason="Line "+actLoTot+" vs consensus "+actConTot+" — lower bar to clear";
        }else{
          // Outlier is HIGH → Under value (higher line than consensus)
          bestDir="UNDER";bestTotal=actHiTot;bestBook=actHiTotBook;
          reason="Line "+actHiTot+" vs consensus "+actConTot+" — more room underneath";
        }
        var dirColor=bestDir==="OVER"?"var(--acc)":"var(--neg)";
        
        h+='<div class="bet-watch" style="margin-top:8px">';
        h+='<div><div class="bet-label">Best O/U Line</div><div style="font-size:15px;font-weight:800;color:'+dirColor+'">'+bestDir+' '+bestTotal+'</div></div>';
        h+='<div class="bet-book">@ '+bestBook.n+'</div>';
        h+='<div style="font-size:10px;color:var(--tm)">'+reason+'</div>';
        h+='<div style="font-size:10px;color:var(--warn);font-weight:700">'+spread.toFixed(1)+' line gap</div>';
        h+='</div>';
      }

      var vb=ab.filter(function(bk){return g.bd[bk.id]&&g.bd[bk.id].total!=null});
      if(vb.length){
        h+='<div class="blr">';
        vb.forEach(function(bk){
          var d=g.bd[bk.id];
          var isBest=(actLoTotBook&&bk.id===actLoTotBook.id)||(actHiTotBook&&bk.id===actHiTotBook.id);
          h+='<div class="bl'+(isBest?" best":"")+'"><div class="bln">'+bk.n+'</div><div class="blv'+(isBest?" hi":"")+'">'+(d.total||"—")+'</div></div>';
        });
        h+='</div>';
      }
      h+='</div>';
    });
  }

  // ═══ BOOKS TAB ═══
  else if(S.tab==="books"){
    h+='<h2 class="sg" style="margin:0 0 6px;font-size:18px;font-weight:800">📚 Pennsylvania Sportsbooks</h2>';
    h+='<p style="margin:0 0 14px;font-size:12px;color:var(--td)">11 PGCB-licensed books — toggle to filter line comparisons. Use the model\'s fair implied odds to compare lines on books without API coverage.</p>';
    h+='<div class="bgrid">';
    PA.forEach(function(bk){
      var on=S.booksOn[bk.id];
      h+='<button class="bcard'+(on?" on":"")+'" onclick="toggleBook(\''+bk.id+'\')"'+(!bk.api?' style="opacity:0.75"':'')+'>';
      h+='<div style="display:flex;justify-content:space-between;align-items:center">';
      h+='<span style="font-size:13px;font-weight:700;color:'+(on?"var(--tx)":"var(--td)")+'">'+bk.n+'</span>';
      h+='<span style="width:16px;height:16px;border-radius:4px;background:'+(on?"var(--acc)":"var(--tf)")+';display:flex;align-items:center;justify-content:center;font-size:10px;color:'+(on?(t==="dark"?"#0c0e17":"#fff"):"#fff")+';font-weight:800">'+(on?"✓":"")+'</span>';
      h+='</div>';
      if(bk.api){
        h+='<div style="font-size:9px;color:'+(on?"var(--acc)":"var(--td)")+';margin-top:4px">✓ Live odds'+(bk.note?" · "+bk.note:"")+'</div>';
      }else{
        h+='<div style="font-size:9px;color:var(--warn);margin-top:4px">'+(bk.note||"No API coverage")+'</div>';
      }
      h+='</button>';
    });
    h+='</div>';
    h+='<div style="margin-top:16px;background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px">';
    h+='<p style="margin:0;font-size:12px;line-height:1.8;color:var(--tm)"><strong>Live odds (6 books):</strong> FanDuel, DraftKings, BetMGM, BetRivers, betPARX, theScore Bet. <strong>Paid API tier:</strong> Caesars, Fanatics (upgrade your Odds API plan to include them). <strong>Not in API:</strong> bet365, SugarHouse, Mohegan — use the Fair Implied odds from the ML tab as your benchmark, then check these books\' apps directly for better lines. 21+ and physically in PA to wager.</p></div>';

    // ── API DIAGNOSTIC ──
    var ld=S[S.league]||{};
    var apiBooks=ld.apiBooks||[];
    if(apiBooks.length>0||ld.lastFetch){
      h+='<div style="margin-top:12px;background:var(--alt);border:1px solid var(--bdL);border-radius:8px;padding:12px">';
      h+='<div style="font-size:10px;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">API Diagnostic — Last Fetch</div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:6px">';
      PA.forEach(function(bk){
        if(!bk.api)return;
        var returned=apiBooks.indexOf(bk.key)>=0;
        var bg=returned?"rgba(0,255,163,.12)":"rgba(255,77,106,.08)";
        var col=returned?"var(--acc)":"var(--neg)";
        var icon=returned?"✓":"✗";
        h+='<div style="padding:4px 10px;border-radius:5px;background:'+bg+';border:1px solid '+col+'30;font-size:10px">';
        h+='<span style="color:'+col+';font-weight:700">'+icon+'</span> ';
        h+='<span style="color:var(--tx);font-weight:600">'+bk.n+'</span>';
        h+='<span style="color:var(--td);font-size:8px;margin-left:3px">('+bk.key+')</span>';
        h+='</div>';
      });
      h+='</div>';
      h+='<div style="font-size:10px;color:var(--tm);margin-top:8px">'+apiBooks.length+' books returned data. bet365, SugarHouse, Mohegan are not available through any odds API — use the fair implied odds from the model as your reference line.</div>';
      h+='</div>';
    }
  }

  h+='</div>';

  // ── FOOTER ──
  h+='<div class="ft">DIAMOND EDGE v11d · '+(isNHL?"NHL: 22,991 games backtested · Home 5% / Away 7% · B2B+CLV stacking · Opening lines only":"MLB: v11d model (no bias) · 56.5% acc · ML +9.9% ROI @ 10%+ · Dog +1.5 +7.7% @ 8%+")+' · 21+ · 1-800-GAMBLER</div>';

  document.getElementById("app").innerHTML=h;
}

// ── BOOT — load ALL sports + props on startup ──
refreshAll();
</script>
</body>
