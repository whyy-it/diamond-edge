// CORS-safe fetch — uses Cloudflare Worker if configured, else free proxies
var proxyErrors=[];
async function corsProxyFetch(url,opts){
  // Skip direct fetch for domains known to block cross-origin
  var knownCORS=["moneypuck.com","api-web.nhle.com","nhle.com"];
  var skipDirect=knownCORS.some(function(d){return url.indexOf(d)>=0;});
  if(!skipDirect){
    try{
      var ac=new AbortController();var tm=setTimeout(function(){ac.abort()},4000);
      var r=await fetch(url,Object.assign({signal:ac.signal},opts||{}));
      clearTimeout(tm);
      if(r.ok)return r;
    }catch(e){}
  }

  // Content validation helper
  var expectCSV=url.indexOf(".csv")>=0;
  var expectJSON=url.indexOf("nhle.com")>=0||url.indexOf("api-web")>=0;
  async function isHTMLResponse(resp){
    var cloned=resp.clone();
    var peek=await cloned.text();
    var t=peek.trim();
    if(t.substring(0,15).toLowerCase().indexOf("<!doctype")>=0||t.substring(0,5)==="<html"||(!expectJSON&&t.substring(0,1)==="<")){
      return{isHTML:true,text:peek};
    }
    return{isHTML:false,text:peek};
  }

  // 1. Try Cloudflare Worker first (most reliable)
  if(CF_WORKER){
    try{
      var wUrl=CF_WORKER+encodeURIComponent(url);
      var wr=await fetch(wUrl,opts||{});
      if(wr.ok){
        var check=await isHTMLResponse(wr);
        if(!check.isHTML){
          console.log("[DE] CF Worker succeeded for "+url.substring(0,80));
          return new Response(check.text,{status:200,headers:{"Content-Type":expectCSV?"text/csv":"application/json"}});
        }
      }
    }catch(e){console.log("[DE] CF Worker failed:",e.message);lastProxyError={type:"cf_worker",url:url.substring(0,80),time:new Date(),msg:e.message};}
  }

  // 2. Free proxy fallbacks with retry
  for(var round=0;round<2;round++){
    if(round>0)await new Promise(function(r){setTimeout(r,1500);});
    for(var i=0;i<CORS_PROXIES.length;i++){
      try{
        var pUrl=CORS_PROXIES[i]+encodeURIComponent(url);
        var ac2=new AbortController();var tm2=setTimeout(function(){ac2.abort()},8000);
        var r2=await fetch(pUrl,Object.assign({signal:ac2.signal},opts||{}));
        clearTimeout(tm2);
        if(r2.ok){
          var check2=await isHTMLResponse(r2);
          if(!check2.isHTML){
            console.log("[DE] CORS proxy "+i+" succeeded for "+url.substring(0,80)+(round>0?" (retry)":""));
            return new Response(check2.text,{status:200,headers:{"Content-Type":expectCSV?"text/csv":"application/json"}});
          }else{
            console.log("[DE] CORS proxy "+i+" returned HTML instead of data, skipping");
          }
        }
      }catch(e){
        if(round===0)console.log("[DE] CORS proxy "+i+" failed: "+e.message);
      }
    }
  }
  lastProxyError={type:"all_proxies",url:url.substring(0,80),time:new Date(),msg:"All CORS proxies failed"};
  throw new Error("All CORS proxies failed for: "+url.substring(0,80));
}

// BET TRACKER — localStorage-backed bet history + P&L
// ═══════════════════════════════════════════════════════════
var TRACKER_KEY="de_bet_tracker";

function loadTracker(){
  try{var s=localStorage.getItem(TRACKER_KEY);if(s)return JSON.parse(s);}catch(e){}
  return[];
}
function saveTracker(bets){
  try{localStorage.setItem(TRACKER_KEY,JSON.stringify(bets));}catch(e){}
}
var trackedBets=loadTracker();

function betKey(b){
  // Unique key per bet: sport+player+market+date
  var d=new Date(b.time||Date.now()).toISOString().slice(0,10);
  return(b.sport||"")+"_"+(b.player||"")+"_"+(b.market||"")+"_"+d;
}
function findTracked(key){
  return trackedBets.find(function(tb){return tb.key===key});
}
function trackBet(bet){
  var key=betKey(bet);
  var existing=findTracked(key);
  if(existing)return; // already tracked
  trackedBets.push({
    key:key,sport:bet.sport,icon:bet.icon,type:bet.type,
    player:bet.player,market:bet.market,line:bet.line,
    book:bet.book,edge:bet.edge,kelly:bet.scaledKelly||bet.kelly,
    amount:bet.betAmount||0,matchup:bet.matchup,time:bet.time,
    placed:new Date().toISOString(),result:null,payout:0
  });
  saveTracker(trackedBets);render();
}
function untrackBet(key){
  trackedBets=trackedBets.filter(function(b){return b.key!==key});
  saveTracker(trackedBets);render();
}
function recordResult(key,result){
  var tb=findTracked(key);
  if(!tb)return;
  tb.result=result; // "W", "L", or "P" (push)
  if(result==="W"){
    // Calculate payout from the line (moneyline odds)
    var ml=parseInt(tb.line.replace("+",""))||0;
    if(ml>0)tb.payout=+(tb.amount*(ml/100)).toFixed(2);
    else if(ml<0)tb.payout=+(tb.amount*(100/(-ml))).toFixed(2);
    else tb.payout=0;
  }else if(result==="P"){
    tb.payout=0;
  }else{
    tb.payout=-tb.amount;
  }
  saveTracker(trackedBets);render();
}
function clearTracker(){
  if(!confirm("Clear ALL tracked bet history?"))return;
  trackedBets=[];saveTracker(trackedBets);render();
}

function trackerStats(){

  var wins=trackedBets.filter(function(b){return b.result==="W"}).length;
  var losses=trackedBets.filter(function(b){return b.result==="L"}).length;

  var pending=trackedBets.filter(function(b){return b.result==null}).length;
  var totalWagered=trackedBets.filter(function(b){return b.result!=null}).reduce(function(s,b){return s+b.amount},0);
  var totalPayout=trackedBets.filter(function(b){return b.result!=null}).reduce(function(s,b){return s+b.payout},0);
  var roi=totalWagered>0?((totalPayout/totalWagered)*100).toFixed(1):0;
  var units=totalWagered>0?(totalPayout/(totalWagered/total||1)).toFixed(2):0;
  return{total:total,wins:wins,losses:losses,pushes:pushes,pending:pending,
    wagered:totalWagered,payout:totalPayout,profit:+(totalPayout).toFixed(2),roi:roi,units:units};
}

  var pending=fb.filter(function(b){return b.result==null}).length;
  var wagered=fb.filter(function(b){return b.result!=null}).reduce(function(s,b){return s+b.amount},0);

}

// ═══════════════════════════════════════════════════════════
// ═══ SIMULTANEOUS KELLY — optimal sizing for concurrent bets ═══
// Maximizes E[log(wealth)] across all 2^n outcome combinations.
// Formula per bet: f* = (bp - q) / b, then optimal multiplier m
// accounts for shared bankroll exposure across all simultaneous bets.
// More bets → lower m → smaller per-bet stakes (diversification drag).
// Ref: SBR Kelly Calculator (sportsbookreview.com)

function simultaneousKelly(bets){
  // bets = [{p: win probability (decimal), b: net decimal odds, kelly: individual Kelly %}]
  var n=bets.length;
  if(n===0)return{multiplier:1,fractions:[]};
  if(n===1)return{multiplier:1,fractions:[bets[0].kelly]};
  if(n>15)return{multiplier:1,fractions:bets.map(function(b){return b.kelly;})};
  
  var outcomes=Math.pow(2,n);
  var outcomeData=[];
  for(var mask=0;mask<outcomes;mask++){
    var prob=1;var payoffs=[];
    for(var i=0;i<n;i++){
      var win=(mask>>i)&1;
      prob*=win?bets[i].p:(1-bets[i].p);
      payoffs.push(win?bets[i].b:-1);
    }
    outcomeData.push({prob:prob,payoffs:payoffs});
  }
  
  var indKelly=bets.map(function(b){return b.kelly/100;});
  
  function evalM(m){
    var elg=0;
    for(var oi=0;oi<outcomes;oi++){
      var o=outcomeData[oi];
      var wealth=1;
      for(var i=0;i<n;i++){wealth+=m*indKelly[i]*o.payoffs[i];}
      if(wealth<=0)return-Infinity;
      elg+=o.prob*Math.log(wealth);
    }
    return elg;
  }
  
  var lo=0,hi=3.0;
  for(var iter=0;iter<80;iter++){
    var m1=lo+(hi-lo)*0.382;var m2=lo+(hi-lo)*0.618;
    if(evalM(m1)<evalM(m2))lo=m1;else hi=m2;
  }
  var optM=+(((lo+hi)/2).toFixed(6));
  return{multiplier:optM,fractions:indKelly.map(function(k){return+(k*optM*100).toFixed(2);})};
}

// ═══════════════════════════════════════════════════════════
var resolveStatus={running:false,lastRun:null,resolved:0,errors:[]};

function localDateStr(d){
  var dt=new Date(d);
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}

async function autoResolveTracked(){
  var pending=trackedBets.filter(function(b){return b.result==null&&b.time});
  if(!pending.length){resolveStatus.lastRun=new Date();return;}
  resolveStatus.running=true;resolveStatus.errors=[];render();

  // Collect unique local dates from pending bets (+ 1 day before to catch late games)
  var dateSet={};
  pending.forEach(function(b){
    var ds2=localDateStr(b.time);
    dateSet[ds2]=true;
  });
  var datesToFetch=Object.keys(dateSet);

  // Build scores map: "Away Team @ Home Team_YYYY-MM-DD" → {homeScore, awayScore, final}
  var scores={};

  // ── Fetch MLB scores ──
  for(var di=0;di<datesToFetch.length;di++){
    var dateStr=datesToFetch[di];
    try{
      var url=MLB_BASE+"/schedule?sportId=1&date="+dateStr+"&gameType=R&hydrate=linescore";
      var r=await fetch(url);if(!r.ok)continue;
      var d=await r.json();
      (d.dates||[]).forEach(function(dt){(dt.games||[]).forEach(function(g){
        if(!g.status||g.status.statusCode!=="F")return;
        var hn=g.teams&&g.teams.home&&g.teams.home.team?g.teams.home.team.name:"";
        var an=g.teams&&g.teams.away&&g.teams.away.team?g.teams.away.team.name:"";
        var ls=g.linescore||{};
        var hR=(ls.teams&&ls.teams.home)?ls.teams.home.runs||0:0;
        var aR=(ls.teams&&ls.teams.away)?ls.teams.away.runs||0:0;
        if(hn&&an)scores[an+" @ "+hn+"_"+dateStr]={home:hn,away:an,homeScore:hR,awayScore:aR};
      });});
    }catch(e){resolveStatus.errors.push("MLB "+dateStr+": "+e.message);}
  }

  // ── Fetch NHL scores ──
  for(var di2=0;di2<datesToFetch.length;di2++){
    var dateStr2=datesToFetch[di2];
    try{
      var nd=await fetchNHL("/score/"+dateStr2);
      (nd.games||[]).forEach(function(g){
        var gs=g.gameState||"";
        if(gs!=="OFF"&&gs!=="FINAL")return;
        var ht=g.homeTeam||{};var at=g.awayTeam||{};
        var hAbbr=ht.abbrev||"";var aAbbr=at.abbrev||"";
        // Reverse NHL_ABBREVS: abbrev → full Odds API name
        var hName=null,aName=null;
        Object.keys(NHL_ABBREVS).forEach(function(k){
          if(NHL_ABBREVS[k]===hAbbr&&!hName)hName=k;
          if(NHL_ABBREVS[k]===aAbbr&&!aName)aName=k;
        });
        if(hName&&aName){
          scores[aName+" @ "+hName+"_"+dateStr2]={home:hName,away:aName,homeScore:ht.score||0,awayScore:at.score||0};
        }
      });
    }catch(e){resolveStatus.errors.push("NHL "+dateStr2+": "+e.message);}
  }

  // ── Fetch NBA scores (via ESPN — reliable, no CORS issues) ──
  for(var di3=0;di3<datesToFetch.length;di3++){
    var dateStr3b=datesToFetch[di3];
    try{
      var ds3=dateStr3b.replace(/-/g,"");// YYYYMMDD for ESPN
      var nbaUrl="https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates="+ds3;
      var nr=null;
      try{var ac3=new AbortController();var tm3=setTimeout(function(){ac3.abort()},6000);nr=await fetch(nbaUrl,{signal:ac3.signal});clearTimeout(tm3);}catch(e){}
      if(!nr||!nr.ok){try{nr=await corsProxyFetch(nbaUrl);}catch(e2){}}
      if(nr&&nr.ok){
        var nd3=JSON.parse(await nr.text());
        var events3=nd3.events||[];
        events3.forEach(function(ev){
          var completed=ev.status&&ev.status.type&&ev.status.type.completed;
          if(!completed)return;
          (ev.competitions||[]).forEach(function(comp){
            var cs=comp.competitors||[];
            if(cs.length!==2)return;
            var home=cs.find(function(c){return c.homeAway==="home"});
            var away=cs.find(function(c){return c.homeAway==="away"});
            if(!home||!away)return;
            var hName=home.team?home.team.displayName||home.team.name:"";
            var aName=away.team?away.team.displayName||away.team.name:"";
            var hScore=parseInt(home.score)||0;
            var aScore=parseInt(away.score)||0;
            if(!hName||!aName)return;
            scores[aName+" @ "+hName+"_"+dateStr3b]={home:hName,away:aName,homeScore:hScore,awayScore:aScore};
          });
        });
      }
    }catch(e){resolveStatus.errors.push("NBA "+dateStr3b+": "+e.message);}
  }

  // ── Resolve pending bets ──
  var resolved=0;
  pending.forEach(function(tb){
    var dateStr3=localDateStr(tb.time);
    var sc=scores[tb.matchup+"_"+dateStr3];
    if(!sc)return;

    // Determine if bet team is home or away
    var parts=tb.matchup.split(" @ ");
    if(parts.length!==2)return;
    var awayTeam=parts[0],homeTeam=parts[1];
    var isHome=(tb.player===homeTeam);
    var margin=sc.homeScore-sc.awayScore; // positive = home won

    var result=null;
    if(tb.type==="ML"||tb.market==="Moneyline"){
      var teamWon=isHome?(margin>0):(margin<0);
      result=teamWon?"W":"L";
    }else if(tb.type==="RL"||tb.market==="Dog +1.5"){
      // Dog +1.5: covers if dog wins OR loses by exactly 1
      var covers=isHome?(margin>=-1):(margin<=1);
      result=covers?"W":"L";
    }else if(tb.type==="SP"&&tb.market){
      // NBA Spread: market = "Spread -5.5" or "Spread +3"
      // Parse the spread number from the market string
      var spMatch=tb.market.match(/Spread\s*([+-]?\d+\.?\d*)/);
      var spLine=spMatch?parseFloat(spMatch[1]):0;
      // spLine is from the bet team's perspective (e.g., +5.5 or -3)
      // Team covers if their actual margin + spread > 0
      var teamMargin=isHome?margin:-margin;// bet team's margin
      var coverMargin=teamMargin+spLine;
      if(coverMargin>0)result="W";
      else if(coverMargin<0)result="L";
      else result="P";// push
    }else if(tb.type==="OU"&&tb.market){
      // O/U bet: player field contains "OVER" or "UNDER"
      var gameTotal=sc.homeScore+sc.awayScore;
      var ouLine2=parseFloat(tb.market.replace("OVER ","").replace("UNDER ",""))||0;
      if(tb.player==="OVER"){
        result=gameTotal>ouLine2?"W":gameTotal<ouLine2?"L":"P";
      }else{
        result=gameTotal<ouLine2?"W":gameTotal>ouLine2?"L":"P";
      }
    }

    if(result){
      tb.result=result;
      tb.resolvedBy="auto";
      tb.gameScore=sc.homeScore+"-"+sc.awayScore;
      // Calculate payout
      var ml=parseInt((tb.line||"").replace("+",""))||0;
      if(result==="W"){
        if(ml>0)tb.payout=+(tb.amount*(ml/100)).toFixed(2);
        else if(ml<0)tb.payout=+(tb.amount*(100/(-ml))).toFixed(2);
        else tb.payout=0;
      }else{
        tb.payout=-tb.amount;
      }
      resolved++;
    }
  });

  if(resolved>0)saveTracker(trackedBets);
  resolveStatus.running=false;resolveStatus.lastRun=new Date();resolveStatus.resolved=resolved;
  render();
}

function ml2p(ml){return ml<0?-ml/(-ml+100):100/(ml+100)}
function p2ml(p){if(p==null||p<=0||p>=100)return null;var d=p/100;return d>=0.5?Math.round(-d/(1-d)*100):Math.round((1-d)/d*100)}
function fml(ml){return ml==null?"—":ml>0?"+"+ml:""+ml}
function fImp(p){var ml=p2ml(p);return ml==null?"—":ml>0?"+"+ml:""+ml}
function ft(d){return new Date(d).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
function fd(d){return new Date(d).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
function ds(d){return d.toISOString().slice(0,10)}
// Local date string — avoids UTC shift that makes 10 PM ET show as next day
function localDS(d){var dt=d||new Date();return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}

async function fetchNHLSchedule(){
  // Get today's schedule from NHL API — includes starting goalies
  // Note: NHL schedule endpoint returns a gameWeek with multiple days,
  // so we fetch local today AND tomorrow to cover all displayed games
  try{
    var today=localDS();
    var tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
    var tomorrowStr=localDS(tomorrow);
    var result={};
    
    // Fetch schedule (NHL returns a week around the requested date)
    var d=await fetchNHL("/schedule/"+today);
    var gw=d.gameWeek||[];
    gw.forEach(function(day){
      (day.games||[]).forEach(function(g){
        var ht=g.homeTeam||{};var at=g.awayTeam||{};
        var hName=ht.placeName?ht.placeName.default:"";
        var aName=at.placeName?at.placeName.default:"";
        // Try to get full common names
        var hCommon=ht.commonName?ht.commonName.default:"";
        var aCommon=at.commonName?at.commonName.default:"";
        var hFull=(hName+" "+hCommon).trim();
        var aFull=(aName+" "+aCommon).trim();
        // Goalie info from starting lineup if available
        var hGoalie=null,aGoalie=null,hGoalieConfirmed=false,aGoalieConfirmed=false;
        // Schedule endpoint goalieInNet is the PROJECTED starter, not confirmed
        // Only landing page / gamecenter sources count as confirmed
        if(g.homeTeam&&g.homeTeam.goalieInNet){
          hGoalie=g.homeTeam.goalieInNet.default||null;
          hGoalieConfirmed=false; // Schedule = projection only
        }
        if(g.awayTeam&&g.awayTeam.goalieInNet){
          aGoalie=g.awayTeam.goalieInNet.default||null;
          aGoalieConfirmed=false; // Schedule = projection only
        }
        result[ht.abbrev||""]={
          gameId:g.id,homeAbbrev:ht.abbrev,awayAbbrev:at.abbrev,
          homeFull:hFull,awayFull:aFull,
          homeGoalie:hGoalie,awayGoalie:aGoalie,
          homeGoalieConfirmed:hGoalieConfirmed,awayGoalieConfirmed:aGoalieConfirmed,
          gameState:g.gameState||"FUT",
          startTime:g.startTimeUTC,
        };
      });
    });
    // Second pass: fetch gamecenter landing for each game to get confirmed starters
    // The /gamecenter/{id}/landing endpoint has confirmed goalies earlier than schedule
    var gameIds=Object.values(result).map(function(r){return r.gameId}).filter(Boolean);
    for(var gi=0;gi<gameIds.length;gi++){
      try{
        var landing=await fetchNHL("/gamecenter/"+gameIds[gi]+"/landing");
        if(!landing)continue;
        var gs=landing.gameState||"";
        // Check for confirmed starters in the landing data
        var hTeam=landing.homeTeam||{};var aTeam=landing.awayTeam||{};
        var hAb=hTeam.abbrev||"";
        if(!result[hAb])continue;
        // goalieInNet on landing page — ALWAYS overrides schedule projection
        if(hTeam.goalieInNet&&hTeam.goalieInNet.default){
          result[hAb].homeGoalie=hTeam.goalieInNet.default;
          result[hAb].homeGoalieConfirmed=true;
        }
        if(aTeam.goalieInNet&&aTeam.goalieInNet.default){
          result[hAb].awayGoalie=aTeam.goalieInNet.default;
          result[hAb].awayGoalieConfirmed=true;
        }
        // Also check lineScore.homeTeam/awayTeam for goalie info (LIVE/CRIT games)
        var ls=landing.linescore||landing.lineScore||{};
        if(ls.homeTeam&&ls.homeTeam.goalie){
          var hgName=ls.homeTeam.goalie.firstName?ls.homeTeam.goalie.firstName.default+" "+ls.homeTeam.goalie.lastName.default:null;
          if(hgName){result[hAb].homeGoalie=hgName;result[hAb].homeGoalieConfirmed=true;}
        }
        if(ls.awayTeam&&ls.awayTeam.goalie){
          var agName=ls.awayTeam.goalie.firstName?ls.awayTeam.goalie.firstName.default+" "+ls.awayTeam.goalie.lastName.default:null;
          if(agName){result[hAb].awayGoalie=agName;result[hAb].awayGoalieConfirmed=true;}
        }
        // Check matchup.goalieComparison for PRE-game confirmed starters — ALWAYS overrides
        var mc=landing.matchup||{};
        var gc=mc.goalieComparison||{};
        if(gc.homeTeam&&gc.homeTeam.starter){
          var hSt=gc.homeTeam.starter;
          var hStName=hSt.firstName?hSt.firstName.default+" "+hSt.lastName.default:null;
          if(hStName){result[hAb].homeGoalie=hStName;result[hAb].homeGoalieConfirmed=true;}
        }
        if(gc.awayTeam&&gc.awayTeam.starter){
          var aSt=gc.awayTeam.starter;
          var aStName=aSt.firstName?aSt.firstName.default+" "+aSt.lastName.default:null;
          if(aStName){result[hAb].awayGoalie=aStName;result[hAb].awayGoalieConfirmed=true;}
        }
      }catch(e){/* gamecenter landing optional — don't fail */}
    }
    var confirmed=Object.values(result).filter(function(r){return r.homeGoalieConfirmed||r.awayGoalieConfirmed}).length;
    console.log("[DE] NHL goalies: "+confirmed+"/"+gameIds.length+" games with confirmed starters");
    return result;
  }catch(e){console.log("NHL schedule error:",e);return{}}
}

async function fetchNHLFatigue(){
  // Check today + last 3 days of NHL schedule for B2B and fatigue
  // Uses local dates to avoid UTC shift (10 PM ET = next day in UTC)
  var fatigue={};
  for(var i=0;i<=3;i++){
    var d=new Date();d.setDate(d.getDate()-i);
    var dateStr=localDS(d);
    try{
      var data=await fetchNHL("/schedule/"+dateStr);
      var gw=data.gameWeek||[];
      // Only look at the specific date we requested
      gw.forEach(function(day){
        if(day.date!==dateStr)return;
        (day.games||[]).forEach(function(g){
          var state=g.gameState||"";
          // For today (i=0): count ALL states including FUT/PRE — we need to know who's scheduled
          // For past days (i>0): count all games (they should be finished)
          if(i===0||state==="OFF"||state==="FINAL"||state==="LIVE"||state==="CRIT"||(i>0)){
            var ht=g.homeTeam?g.homeTeam.abbrev:"";
            var at=g.awayTeam?g.awayTeam.abbrev:"";
            [ht,at].forEach(function(t){
              if(!t)return;
              if(!fatigue[t])fatigue[t]={games:[],daysAgo:[]};
              fatigue[t].games.push(g.id);
              fatigue[t].daysAgo.push(i);
            });
          }
        });
      });
    }catch(e){}
  }
  
  // ALSO check tomorrow's schedule to catch B2Bs for tomorrow's games
  // (Odds API often shows tomorrow's games)
  try{
    var tmrw=new Date();tmrw.setDate(tmrw.getDate()+1);
    var tmrwStr=localDS(tmrw);
    var tData=await fetchNHL("/schedule/"+tmrwStr);
    var tGW=tData.gameWeek||[];
    tGW.forEach(function(day){
      if(day.date!==tmrwStr)return;
      (day.games||[]).forEach(function(g){
        var ht=g.homeTeam?g.homeTeam.abbrev:"";
        var at=g.awayTeam?g.awayTeam.abbrev:"";
        [ht,at].forEach(function(t){
          if(!t)return;
          if(!fatigue[t])fatigue[t]={games:[],daysAgo:[]};
          fatigue[t].games.push(g.id);
          fatigue[t].daysAgo.push(-1); // -1 = tomorrow
        });
      });
    });
  }catch(e){}
  
  // Calculate rest days and B2B status
  var result={};
  Object.keys(fatigue).forEach(function(t){
    var days=fatigue[t].daysAgo.filter(function(d){return d>0}).sort();
    // B2B today: playing today (daysAgo=0) AND played yesterday (daysAgo=1)
    var playingToday=fatigue[t].daysAgo.indexOf(0)>=0;
    var playedYesterday=fatigue[t].daysAgo.indexOf(1)>=0;
    var b2bToday=playingToday&&playedYesterday;
    // B2B tomorrow: playing tomorrow (daysAgo=-1) AND playing today (daysAgo=0)
    var playingTomorrow=fatigue[t].daysAgo.indexOf(-1)>=0;
    var b2bTomorrow=playingTomorrow&&playingToday;
    var lastGame=days.length?days[0]:99;
    var gamesIn3=days.filter(function(d){return d<=3}).length;
    result[t]={
      b2b:b2bToday||b2bTomorrow,
      b2bToday:b2bToday,
      b2bTomorrow:b2bTomorrow,
      restDays:lastGame,
      gamesIn3Days:gamesIn3,
      gamesTotal:fatigue[t].games.length,
    };
  });
  console.log("[DE] B2B teams:",Object.keys(result).filter(function(t){return result[t].b2b}).join(", ")||"none");
  return result;
}


async function fetchStatcastPitcherRates(){
  // Fetch Statcast pitcher expected stats: xwOBA-against, xERA, K rates
  var prates={};
  var year=new Date().getFullYear();
  // Pitcher expected stats CSV from Baseball Savant

      var gamesEst=pa/25; // ~25 BF per start for starters

async function fetchNBAStandings(){
  // Build real stats from ESPN scoreboard game results (25 days)
  // Computes: W-L, L10, PPG for/against, margin, net rating, recent trend
  var standings={};
  var teamGames={};// teamName → [{date,pf,pa,won,margin}]

  async function espnFetch(url){
    var r=null;
    try{var ac=new AbortController();var tm=setTimeout(function(){ac.abort()},5000);r=await fetch(url,{signal:ac.signal});clearTimeout(tm);}catch(e){}
    if(!r||!r.ok){try{r=await corsProxyFetch(url);}catch(e2){}}
    return(r&&r.ok)?r:null;
  }

  console.log("[DE] NBA: fetching 25 days of ESPN scoreboard for real stats...");
  var fetchCount=0;
  for(var i=0;i<25;i++){
    var d=new Date();d.setDate(d.getDate()-i);
    var ds=d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
    try{
      var url="https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates="+ds;
      var r=await espnFetch(url);
      if(!r)continue;
      var data=JSON.parse(await r.text());
      var events=data.events||[];
      fetchCount++;
      events.forEach(function(ev){
        var completed=ev.status&&ev.status.type&&ev.status.type.completed;
        if(!completed)return;
        (ev.competitions||[]).forEach(function(comp){
          var cs=comp.competitors||[];
          if(cs.length!==2)return;
          var home=cs.find(function(c){return c.homeAway==="home"});
          var away=cs.find(function(c){return c.homeAway==="away"});
          if(!home||!away)return;
          var hName=home.team?home.team.displayName||home.team.name:"";
          var aName=away.team?away.team.displayName||away.team.name:"";
          var hScore=parseInt(home.score)||0;
          var aScore=parseInt(away.score)||0;
          if(!hName||!aName||hScore+aScore<100)return;
          if(!teamGames[hName])teamGames[hName]=[];
          teamGames[hName].push({date:ds,pf:hScore,pa:aScore,won:hScore>aScore?1:0,margin:hScore-aScore});
          if(!teamGames[aName])teamGames[aName]=[];
          teamGames[aName].push({date:ds,pf:aScore,pa:hScore,won:aScore>hScore?1:0,margin:aScore-hScore});
          // Grab full-season W-L from records
          [home,away].forEach(function(c){
            var tn=c.team?c.team.displayName||c.team.name:"";
            if(!tn)return;
            var recs=c.records||[];
            var ov=recs.find(function(r2){return r2.type==="total";})||recs[0];
            if(ov&&ov.summary){
              var pp=ov.summary.split("-");
              if(pp.length>=2){
                var w=parseInt(pp[0])||0;var l=parseInt(pp[1])||0;
                if(w+l>0&&(!standings[tn]||standings[tn].gp<w+l)){
                  standings[tn]=standings[tn]||{};
                  standings[tn].wins=w;standings[tn].losses=l;standings[tn].gp=w+l;
                }
              }
            }
          });
        });
      });
    }catch(e){}
  }
  console.log("[DE] NBA scoreboard: "+fetchCount+" days fetched, "+Object.keys(teamGames).length+" teams with game data");

  // Compute real stats from game results
  Object.keys(teamGames).forEach(function(tn){
    var games=teamGames[tn];
    games.sort(function(a,b){return b.date.localeCompare(a.date);});
    var n=games.length;if(n<3)return;
    var totPF=0,totPA=0,totW=0;
    games.forEach(function(g){totPF+=g.pf;totPA+=g.pa;totW+=g.won;});
    var ppg=totPF/n;var papg=totPA/n;var avgMargin=(totPF-totPA)/n;
    var l10=games.slice(0,10);var l10w=l10.reduce(function(s,g){return s+g.won},0);
    var l20=games.slice(0,20);var l20w=l20.reduce(function(s,g){return s+g.won},0);
    var r5=games.slice(0,5);var r5ppg=r5.reduce(function(s,g){return s+g.pf},0)/r5.length;
    // Streak
    var streakW=games[0]?games[0].won:0;var streakN=0;
    for(var si=0;si<games.length;si++){if(games[si].won===streakW)streakN++;else break;}
    var existing=standings[tn]||{};
    standings[tn]={
      wins:existing.wins||totW,losses:existing.losses||(n-totW),gp:existing.gp||n,
      ptsFor:totPF,ptsAgainst:totPA,
      ppg:+ppg.toFixed(1),papg:+papg.toFixed(1),avgMargin:+avgMargin.toFixed(1),
      l10w:l10w,l10l:l10.length-l10w,
      l20wp:l20.length>=10?(l20w/l20.length):0.5,
      streak:streakN,streakType:streakW?"W":"L",
      netRtg:+avgMargin.toFixed(1),offRtg:+ppg.toFixed(1),defRtg:+papg.toFixed(1),
      recentPPG:+r5ppg.toFixed(1),sampleGames:n,
    };
  });
  var loaded=Object.keys(standings).filter(function(t){return(standings[t].gp||0)>0}).length;
  console.log("[DE] NBA standings final: "+loaded+" teams ("+Object.keys(teamGames).length+" with real stats from "+fetchCount+" days)");
  return standings;
}

// ═══ NBA INJURY-ADJUSTED SPREAD ENGINE ══════════════════
// Convert win probability → expected margin, then apply star-player injury adjustments
// Research: NBA home court ≈ 3.2 pts. Win prob → margin roughly linear in logit space.
// Calibration: prob=0.50 → margin=0, prob=0.65 → margin≈+5, prob=0.80 → margin≈+10

function probToMargin(prob){
  // Logit-based conversion calibrated to NBA scoring
  // margin ≈ 13.5 * ln(p / (1-p)) — fitted to NBA closing lines
  if(prob<=0.01)return-30;if(prob>=0.99)return 30;
  return 13.5*Math.log(prob/(1-prob));
}

function calcInjuryImpact(teamName, injuries){
  // Returns total spread points lost due to OUT players
  var teamInj=injuries[teamName]||[];
  var totalImpact=0;
  var outPlayers=[];
  teamInj.forEach(function(inj){
    if(inj.status!=="out")return;
    var star=NBA_STAR_IMPACT[inj.name];
    if(!star)return;
    // Only count if the player is actually on this team
    if(star.team!==teamName)return;
    outPlayers.push({name:inj.name,impact:star.impact,detail:inj.detail});
    totalImpact+=star.impact;
  });
  // Diminishing returns: losing 2 stars doesn't double the impact perfectly
  // Apply sqrt scaling for multiple absences beyond the first
  if(outPlayers.length>1){
    outPlayers.sort(function(a,b){return b.impact-a.impact;});
    totalImpact=outPlayers[0].impact;
    for(var i=1;i<outPlayers.length;i++){
      totalImpact+=outPlayers[i].impact*0.6; // diminishing
    }
  }
  return{totalImpact:totalImpact,outPlayers:outPlayers};
}

function computeNBAv1Features(g){
  var standings=S.nba.standings||{};
  var fatigue=S.nba.fatigue||{};
  var NBA_NAME_ALIASES={"Los Angeles Clippers":"LA Clippers","LA Clippers":"Los Angeles Clippers"};
  var hS=standings[g.home]||standings[NBA_NAME_ALIASES[g.home]||""]||{};
  var aS=standings[g.away]||standings[NBA_NAME_ALIASES[g.away]||""]||{};
  var hF=fatigue[g.home]||fatigue[NBA_NAME_ALIASES[g.home]||""]||{b2b:false,restDays:3};
  var aF=fatigue[g.away]||fatigue[NBA_NAME_ALIASES[g.away]||""]||{b2b:false,restDays:3};

  // Baselines (prior-year stats)
  var bl_h=NBA_TEAM_BASELINE[g.home]||{offRtg:110,defRtg:112,netRtg:-2,pace:100,efg:.530,tovPct:14,orebPct:26,ftRate:.26};
  var bl_a=NBA_TEAM_BASELINE[g.away]||{offRtg:110,defRtg:112,netRtg:-2,pace:100,efg:.530,tovPct:14,orebPct:26,ftRate:.26};

  var hGP=Math.max(hS.gp||1,1);
  var aGP=Math.max(aS.gp||1,1);
  var hWP=(hS.wins||0)/hGP; var aWP=(aS.wins||0)/aGP;

  // ════════════════════════════════════════════
  // CRITICAL: f_net_rtg and f_margin must be DIFFERENT signals
  // In training: f_net_rtg = prior-year team rating (stable)
  //              f_margin = rolling L10 margin (recent form)
  // ════════════════════════════════════════════

  // f_net_rtg: STABLE season-long team quality
  // Blend prior-year baseline with full-season win%-derived estimate
  // NBA research: net_rtg ≈ (win% - 0.5) × 30
  var blend_season=Math.min(0.85,hGP/82);// full-season blend (82 games = full year)
  var a_blend_season=Math.min(0.85,aGP/82);
  var h_net_from_wp=(hWP-0.5)*30;// e.g. .600 team → +3.0 net rtg
  var a_net_from_wp=(aWP-0.5)*30;
  var h_net_stable=(hGP>=15)?bl_h.netRtg*(1-blend_season)+h_net_from_wp*blend_season:bl_h.netRtg;
  var a_net_stable=(aGP>=15)?bl_a.netRtg*(1-a_blend_season)+a_net_from_wp*a_blend_season:bl_a.netRtg;

  // f_margin: RECENT FORM from 25-day sample margins
  // Only use the sample data — this is the volatile/recent signal
  var h_margin_recent=hS.avgMargin||0;
  var a_margin_recent=aS.avgMargin||0;

  // Pyth: use real PPG from scoreboard sample (25 days)
  var hPF=hS.ppg||(hS.ptsFor?hS.ptsFor/Math.max(hS.sampleGames||1,1):0)||bl_h.offRtg;
  var hPA=hS.papg||(hS.ptsAgainst?hS.ptsAgainst/Math.max(hS.sampleGames||1,1):0)||bl_h.defRtg;
  var aPF=aS.ppg||(aS.ptsFor?aS.ptsFor/Math.max(aS.sampleGames||1,1):0)||bl_a.offRtg;
  var aPA=aS.papg||(aS.ptsAgainst?aS.ptsAgainst/Math.max(aS.sampleGames||1,1):0)||bl_a.defRtg;

  function nba_pyth(pf,pa){var e=14;return Math.pow(pf,e)/(Math.pow(pf,e)+Math.pow(pa,e))||0.5;}
  var hPyth=nba_pyth(hPF,hPA); var aPyth=nba_pyth(aPF,aPA);

  // L10: real from scoreboard
  var hL10W=hS.l10w||0;var hL10L=hS.l10l||0;var hL10T=Math.max(hL10W+hL10L,1);
  var aL10W=aS.l10w||0;var aL10L=aS.l10l||0;var aL10T=Math.max(aL10W+aL10L,1);
  var hL10=hL10W/hL10T; var aL10=aL10W/aL10T;

  // L20 win%: from scoreboard or full season
  var hL20=hS.l20wp||hWP;var aL20=aS.l20wp||aWP;

  // Rest
  var h_rest=hF.restDays||3; var a_rest=aF.restDays||3;
  var h_b2b=hF.b2b?1:0; var a_b2b=aF.b2b?1:0;

  // Travel
  var hAbbr=NBA_ABBREVS[g.home]||"";var aAbbr=NBA_ABBREVS[g.away]||"";
  var tzDiff=Math.abs((NBA_TZ[hAbbr]||0)-(NBA_TZ[aAbbr]||0));

  var features={
    f_home:1.0,
    f_net_rtg:(h_net_stable-a_net_stable)/10,  // STABLE: season-long quality
    f_pyth:(hPyth-aPyth)*5,
    f_l10:(hL10-aL10)*3,
    f_l20:(hL20-aL20)*3,
    f_margin:(h_margin_recent-a_margin_recent)/10,  // RECENT: 25-day sample form
    f_pace:(bl_h.pace-bl_a.pace)/5,
    f_rest:Math.min(2,Math.max(-2,h_rest-a_rest)),
    f_b2b:a_b2b-h_b2b,
    f_efg:(bl_h.efg-bl_a.efg)*20,
    f_tov:(bl_a.tovPct-bl_h.tovPct)/5,
    f_oreb:(bl_h.orebPct-bl_a.orebPct)/10,
    f_ft_rate:(bl_h.ftRate-bl_a.ftRate)*10,
    f_travel:tzDiff/3*(a_rest<=1?1:0),
    f_streak:Math.min(2,Math.max(-2,((hS.streakType==="W"?hS.streak||0:-(hS.streak||0))-(aS.streakType==="W"?aS.streak||0:-(aS.streak||0)))/3)),
    f_b2b_x_rtg:(a_b2b-h_b2b)*Math.abs((h_net_stable-a_net_stable)/10),
    f_rest_x_form:Math.min(2,Math.max(-2,h_rest-a_rest))*(hL10-aL10)*3,
    f_pace_x_efg:(bl_h.pace-bl_a.pace)/5*(bl_h.efg-bl_a.efg)*20,
    f_scoring_trend:((hS.recentPPG||hPF)-(aS.recentPPG||aPF))/10,
  };

  g.nbaFeatures=features;
  return features;
}

function enrichNBAGames(games){
  var standings=S.nba.standings||{};var fatigue=S.nba.fatigue||{};var injuries=S.nba.injuries||{};
  
  // Name aliases: Odds API ↔ ESPN can differ
  var NBA_NAME_ALIASES={"Los Angeles Clippers":"LA Clippers","LA Clippers":"Los Angeles Clippers"};
  function findStandings(name){
    return standings[name]||standings[NBA_NAME_ALIASES[name]||""]||{};
  }
  function findFatigue(name){
    return fatigue[name]||fatigue[NBA_NAME_ALIASES[name]||""]||{b2b:false,restDays:3};
  }
  function findInjuries(name){
    return injuries[name]||injuries[NBA_NAME_ALIASES[name]||""]||[];
  }
  
  var standingsLoaded=Object.values(standings).some(function(s){return(s.wins||0)>0;});
  if(!standingsLoaded)console.log("[DE] WARNING: NBA standings empty — model predictions will use baselines only");
  return games.map(function(g){
    var hAbbr=NBA_ABBREVS[g.home]||"";var aAbbr=NBA_ABBREVS[g.away]||"";
    var hS=findStandings(g.home);var aS=findStandings(g.away);
    var hF=findFatigue(g.home);
    var aF=findFatigue(g.away);

    g.homeB2B=hF.b2b;g.awayB2B=aF.b2b;g.homeRest=hF.restDays||3;g.awayRest=aF.restDays||3;
    g.homeRecord=(hS.wins||0)+"-"+(hS.losses||0);
    g.awayRecord=(aS.wins||0)+"-"+(aS.losses||0);
    g.homeL10=(hS.l10w||0)+"-"+(hS.l10l||0);
    g.awayL10=(aS.l10w||0)+"-"+(aS.l10l||0);
    g.homeStreak=(hS.streakType||"")+(hS.streak||"");
    g.awayStreak=(aS.streakType||"")+(aS.streak||"");
    g.restDiff=(aF.restDays||3)-(hF.restDays||3);
    g.tzDiff=Math.abs((NBA_TZ[hAbbr]||0)-(NBA_TZ[aAbbr]||0));

    // ═══ INJURY DISPLAY (context only — does NOT modify model) ═══
    var hInj=calcInjuryImpact(g.home,injuries);
    var aInj=calcInjuryImpact(g.away,injuries);
    g.homeInjury=hInj; g.awayInjury=aInj;
    g.injurySwing=+(aInj.totalImpact-hInj.totalImpact).toFixed(1);
    var hInjList=findInjuries(g.home);var aInjList=findInjuries(g.away);
    g.homeInjuryList=(Array.isArray(hInjList)?hInjList:[]).filter(function(i){return i.status==="out"||i.status==="doubtful";});
    g.awayInjuryList=(Array.isArray(aInjList)?aInjList:[]).filter(function(i){return i.status==="out"||i.status==="doubtful";});

    // ═══ NBA V3 ML MODEL (base, no injury adjustment — backtested +27.4% ROI @8%) ═══
    var features=computeNBAv1Features(g);
    var mlProb=predictNBA_ML(features);
    g.modelProb=+mlProb.toFixed(4);
    g.modelFairH=+(mlProb*100).toFixed(1);
    g.modelFairA=+(100-g.modelFairH).toFixed(1);
    g.features=features;

    // ═══ MONEYLINE EDGES ═══
    var hImp=ml2p(g.bestHML)||0.5;var aImp=ml2p(g.bestAML)||0.5;
    var vigT=hImp+aImp;var fairH=hImp/vigT;var fairA=aImp/vigT;
    g.modelHEdge=+((mlProb-fairH)*100).toFixed(1);
    g.modelAEdge=+(((1-mlProb)-fairA)*100).toFixed(1);
    g.modelTopEdge=Math.max(g.modelHEdge,g.modelAEdge);
    g.modelBetSide=g.modelTopEdge>5?(g.modelHEdge>=g.modelAEdge?"HOME":"AWAY"):null;

    // Safety: suppress bets if standings didn't load
    if(!standingsLoaded){
      g.modelTopEdge=0;g.modelHEdge=0;g.modelAEdge=0;g.modelBetSide=null;
      g.standingsWarning=true;
    }
    // Safety: suppress if EITHER team has no data loaded (name mismatch, etc.)
    var hGP2=(hS.gp||hS.wins||0);var aGP2=(aS.gp||aS.wins||0);
    if(hGP2===0||aGP2===0){
      g.modelTopEdge=0;g.modelHEdge=0;g.modelAEdge=0;g.modelBetSide=null;
      g.dataWarning=true;
    }
    // Cap edge at 40% — extreme edges on long-shot lines are noise
    if(g.modelTopEdge>40){g.modelTopEdge=40;g.modelHEdge=Math.min(40,g.modelHEdge);g.modelAEdge=Math.min(40,g.modelAEdge);g.edgeCapped=true;}

    // ═══ SIGNALS ═══
    var signals=[];
    // Injury signals (display context)
    if(hInj.outPlayers.length>0){
      hInj.outPlayers.forEach(function(p){
        signals.push({icon:"🚑",text:p.name+" OUT (−"+p.impact.toFixed(1)+" pts)",type:"fade"});
      });
    }
    if(aInj.outPlayers.length>0){
      aInj.outPlayers.forEach(function(p){
        signals.push({icon:"🚑",text:p.name+" OUT (−"+p.impact.toFixed(1)+" pts)",type:"boost"});
      });
    }
    if(Math.abs(g.injurySwing)>=3){
      var injFav=g.injurySwing>0?g.home:g.away;
      signals.push({icon:"💊",text:"Injury swing: "+injFav+" +"+(Math.abs(g.injurySwing)).toFixed(1)+" pts (context only)",type:g.injurySwing>0?"boost":"fade"});
    }
    // B2B / rest signals
    if(g.awayB2B&&!g.homeB2B)signals.push({icon:"🔴",text:g.away+" on B2B",type:"boost"});
    if(g.homeB2B&&!g.awayB2B)signals.push({icon:"🔴",text:g.home+" on B2B",type:"fade"});
    if(g.homeB2B&&g.awayB2B)signals.push({icon:"🟡",text:"Both on B2B",type:"neutral"});
    if(!g.homeB2B&&!g.awayB2B&&Math.abs(g.restDiff)>=2){
      signals.push({icon:"💤",text:(g.restDiff>0?g.home:g.away)+" rest advantage",type:g.restDiff>0?"boost":"fade"});}
    if(g.tzDiff>=2&&(g.awayRest||3)<=1)signals.push({icon:"✈️",text:g.away+" crossed "+g.tzDiff+" TZ on short rest",type:"boost"});
    if(g.standingsWarning)signals.push({icon:"⚠️",text:"Standings not loaded — edges suppressed, predictions unreliable",type:"neutral"});
    if(g.dataWarning)signals.push({icon:"⚠️",text:"Missing data for one or both teams — edges suppressed",type:"neutral"});
    if(g.edgeCapped)signals.push({icon:"📊",text:"Edge capped at 40% (long-shot line amplification)",type:"neutral"});
    if(!signals.length)signals.push({icon:"🏀",text:"No strong signals",type:"neutral"});
    g.signals=signals;

    g.contextAdj=0;g.hEdge=g.modelHEdge;g.aEdge=g.modelAEdge;g.topEdge=g.modelTopEdge;

    return g;
  });
}

async function fetchMLBStandings(){
  // Returns: {teamName: {wins, losses, rs, ra, l10w, l10l, gp}}
  var standings={};
  var year=new Date().getFullYear();
  try{
    var url=MLB_BASE+"/standings?leagueId=103,104&season="+year+"&standingsTypes=regularSeason&hydrate=team";
    var r=await fetch(url);if(!r.ok)return standings;
    var d=await r.json();
    (d.records||[]).forEach(function(div){
      (div.teamRecords||[]).forEach(function(tr){
        var tn2=tr.team?tr.team.name:"";
        var l10=tr.records&&tr.records.splitRecords?tr.records.splitRecords.find(function(s){return s.type==="lastTen"}):null;
        standings[tn2]={
          wins:tr.wins||0,losses:tr.losses||0,
          gp:(tr.wins||0)+(tr.losses||0),
          rs:tr.runsScored||0,ra:tr.runsAllowed||0,
          l10w:l10?l10.wins||0:0,l10l:l10?l10.losses||0:0
        };
      });
    });
    console.log("[Diamond Edge] MLB standings loaded: "+Object.keys(standings).length+" teams");
  }catch(e){console.log("[Diamond Edge] MLB standings error:",e);}
  return standings;
}

async function fetchMLBRecentScores(){
  // Fetch last 10 days of results for run differentials
  // Returns: {teamName: {l10_rd: avg run diff last 10 games, l30_wp: approx}}
  var results={};
  var today=new Date();
  var tenAgo=new Date(today);tenAgo.setDate(tenAgo.getDate()-14); // 14 days covers ~10 games
  try{
    var url=MLB_BASE+"/schedule?sportId=1&startDate="+ds(tenAgo)+"&endDate="+ds(today)+"&gameType=R&hydrate=linescore";
    var r=await fetch(url);if(!r.ok)return results;
    var d=await r.json();
    (d.dates||[]).forEach(function(dt){
      (dt.games||[]).forEach(function(g){
        if(!g.status||g.status.statusCode!=="F")return;
        var ls=g.linescore||{};
        var hRuns=(ls.teams&&ls.teams.home)?ls.teams.home.runs||0:0;
        var aRuns=(ls.teams&&ls.teams.away)?ls.teams.away.runs||0:0;
        var hName=g.teams&&g.teams.home&&g.teams.home.team?g.teams.home.team.name:"";
        var aName=g.teams&&g.teams.away&&g.teams.away.team?g.teams.away.team.name:"";
        [hName,aName].forEach(function(tn2){
          if(!tn2)return;
          if(!results[tn2])results[tn2]={games:[],wins:0};
          var isHome=tn2===hName;
          var myRuns=isHome?hRuns:aRuns;
          var oppRuns=isHome?aRuns:hRuns;
          var won=myRuns>oppRuns?1:0;
          results[tn2].games.push({rd:myRuns-oppRuns,won:won});
          results[tn2].wins+=won;
        });
      });
    });
    // Compute averages
    Object.keys(results).forEach(function(tn2){
      var r2=results[tn2];
      var recent=r2.games.slice(-10);
      r2.l10_rd=recent.length>0?recent.reduce(function(s,g){return s+g.rd},0)/recent.length:0;
      r2.l10_wp=recent.length>=5?recent.reduce(function(s,g){return s+g.won},0)/recent.length:0.5;
      var all=r2.games;
      r2.l30_wp=all.length>=10?all.reduce(function(s,g){return s+g.won},0)/all.length:0.5;
    });
    console.log("[Diamond Edge] Recent scores loaded: "+Object.keys(results).length+" teams");
  }catch(e){console.log("[Diamond Edge] Recent scores error:",e);}
  return results;
}

      var lines=text.trim().split("\n");
      if(lines.length>=2){

        var header=lines[0].split(",").map(function(h){return h.trim().replace(/"/g,"").toLowerCase()});
        var nameIdx=header.indexOf("team_name");if(nameIdx<0)nameIdx=header.indexOf("team");if(nameIdx<0)nameIdx=0;
        var xwobaIdx=header.indexOf("est_woba");if(xwobaIdx<0)xwobaIdx=header.indexOf("xwoba");
        var evIdx=header.indexOf("avg_hit_speed");if(evIdx<0)evIdx=header.indexOf("exit_velocity");
        var barrelIdx=header.indexOf("barrel_batted_rate");if(barrelIdx<0)barrelIdx=header.indexOf("brl_percent");
        
        for(var i=1;i<lines.length;i++){
          var cols=lines[i].split(",").map(function(c){return c.trim().replace(/"/g,"")});
          var abbr=cols[nameIdx]||"";
          var fullName=SAV_NAMES[abbr]||abbr;
          if(!fullName)continue;
          if(!stats[fullName])stats[fullName]={};
          if(xwobaIdx>=0)stats[fullName].xwOBA=parseFloat(cols[xwobaIdx])||0;
          if(evIdx>=0)stats[fullName].ev=parseFloat(cols[evIdx])||0;
          if(barrelIdx>=0)stats[fullName].barrel=parseFloat(cols[barrelIdx])||0;
        }
      }
    }
    console.log("[Diamond Edge] Savant team batting loaded: "+Object.keys(stats).length+" teams");
  }catch(e){console.log("[Diamond Edge] Savant team batting error:",e);}
  return stats;
}

function blendStat(live,baseline,key,defaultVal){
  if(!live||!live.gp||live.gp<10)return baseline||defaultVal;
  var w=Math.min(0.95,live.gp/60);
  var lv=live[key];
  if(lv==null||lv===0)return baseline||defaultVal;
  return +((baseline||defaultVal)*(1-w)+lv*w).toFixed(4);
}

function computeFeatures(g){
  // g = game object with all enriched data
  // Returns: feature vector object {f_home, f_pyth, ...}
  var bl_h=MLB_TEAM_BASELINE[g.home]||{wRC:100,OPS:.720,ERA:4.0,FIP:4.0,BB9:3.2,xwOBA:.315,barrel:.07,ev:88};
  var bl_a=MLB_TEAM_BASELINE[g.away]||{wRC:100,OPS:.720,ERA:4.0,FIP:4.0,BB9:3.2,xwOBA:.315,barrel:.07,ev:88};
  var ts=S.mlb.teamStats||{};
  var st=S.mlb.standings||{};
  var rc=S.mlb.recentScores||{};
  var fat=S.mlb.fatigue||{};
  var info=S.mlb.lineups[g.home]||{};

  // Live team stats with baseline blending
  var lh=ts[g.home]||{};var la=ts[g.away]||{};
  var h_ops=blendStat(lh,bl_h.OPS,"OPS",.720);
  var a_ops=blendStat(la,bl_a.OPS,"OPS",.720);

  var h_era=blendStat(lh,bl_h.ERA,"ERA",4.0);
  var a_era=blendStat(la,bl_a.ERA,"ERA",4.0);
  var h_bb9=blendStat(lh,bl_h.BB9,"BB9",3.2);
  var a_bb9=blendStat(la,bl_a.BB9,"BB9",3.2);

  // FanGraphs live: wRC+, FIP (blend with baseline)
  var fg=S.mlb.fangraphs||{};
  var fgh=fg[g.home]||{};var fga=fg[g.away]||{};
  var gp_est=(lh.gp||0);
  var fg_w=gp_est>=10?Math.min(0.95,gp_est/60):0; // Same blend curve
  var h_wrc=fgh.wRC>0?bl_h.wRC*(1-fg_w)+fgh.wRC*fg_w:bl_h.wRC;
  var a_wrc=fga.wRC>0?bl_a.wRC*(1-fg_w)+fga.wRC*fg_w:bl_a.wRC;
  var h_fip=fgh.FIP>0?bl_h.FIP*(1-fg_w)+fgh.FIP*fg_w:bl_h.FIP;
  var a_fip=fga.FIP>0?bl_a.FIP*(1-fg_w)+fga.FIP*fg_w:bl_a.FIP;

  // Savant team batting live: xwOBA, Barrel%, Exit Velocity (blend with baseline)
  var sav=S.mlb.savantTeam||{};
  var savh=sav[g.home]||{};var sava=sav[g.away]||{};
  var h_xwoba=savh.xwOBA>0?bl_h.xwOBA*(1-fg_w)+savh.xwOBA*fg_w:bl_h.xwOBA;
  var a_xwoba=sava.xwOBA>0?bl_a.xwOBA*(1-fg_w)+sava.xwOBA*fg_w:bl_a.xwOBA;
  var h_barrel=savh.barrel>0?bl_h.barrel*(1-fg_w)+savh.barrel*fg_w:bl_h.barrel;
  var a_barrel=sava.barrel>0?bl_a.barrel*(1-fg_w)+sava.barrel*fg_w:bl_a.barrel;
  var h_ev=savh.ev>0?bl_h.ev*(1-fg_w)+savh.ev*fg_w:bl_h.ev;
  var a_ev=sava.ev>0?bl_a.ev*(1-fg_w)+sava.ev*fg_w:bl_a.ev;

  // Standings: Pythagorean, L10
  var sh=st[g.home]||{};var sa=st[g.away]||{};
  var h_pyth=pythWP(sh.rs||bl_h.wRC*4,sh.ra||bl_h.ERA*150);
  var a_pyth=pythWP(sa.rs||bl_a.wRC*4,sa.ra||bl_a.ERA*150);

  // Recent form
  var rh=rc[g.home]||{};var ra2=rc[g.away]||{};
  var h_l10=rh.l10_wp!=null?rh.l10_wp:(sh.gp>0?(sh.l10w/(sh.l10w+sh.l10l)||0.5):0.5);
  var a_l10=ra2.l10_wp!=null?ra2.l10_wp:(sa.gp>0?(sa.l10w/(sa.l10w+sa.l10l)||0.5):0.5);
  var h_l30=rh.l30_wp!=null?rh.l30_wp:(sh.gp>0?sh.wins/sh.gp:0.5);
  var a_l30=ra2.l30_wp!=null?ra2.l30_wp:(sa.gp>0?sa.wins/sa.gp:0.5);
  var h_l10_rd=rh.l10_rd||0;
  var a_l10_rd=ra2.l10_rd||0;

  // Starting pitcher Statcast — v11d blending:
  //   Prior-year Statcast as baseline, blend in current-year as PA grows
  //   < 25 PA current year → 100% prior year
  //   25-100 PA → linear blend
  //   100+ PA → 100% current year
  var psc=S.mlb.pitcherStatcast||{};
  
  function blendSC(pitcherName){
    var sc=psc[pitcherName];
    if(!sc)return {}; // No Statcast at all — defaults will be used
    // Current-year Statcast data from Savant
    // Estimate how far into season: PA available now
    var pa=sc.pa||0;
    // The Savant CSV we fetch is always current-year
    // xERA estimate from xBA-against
    var cur_xera=sc.xbaAgainst?3.2+(sc.xbaAgainst-0.240)*40:null;
    var cur_xwoba=sc.xbaAgainst?sc.xbaAgainst*1.3+0.010:null;
    // For prior-year, we use defaults (the model was trained on prior-year, so defaults ARE the prior)
    // When current-year PA is low, lean toward defaults (prior-year proxy)
    if(pa<25||cur_xera==null)return {}; // Not enough data, use defaults
    if(pa>=100)return {xERA:cur_xera,xwOBA:cur_xwoba||0.320,pa:pa};
    // Blend: default values are the "prior-year" stand-in
    var w=(pa-25)/75;
    return{
      xERA:4.2*(1-w)+cur_xera*w,
      xwOBA:0.320*(1-w)+(cur_xwoba||0.320)*w,
      pa:pa
    };
  }
  
  var hsp=blendSC(info.homePitcher);
  var asp=blendSC(info.awayPitcher);
  // xERA estimate from xBA-against: xERA ≈ 3.2 + (xBA - 0.240) * 40
  var h_sp_xera=hsp.xbaAgainst?3.2+(hsp.xbaAgainst-0.240)*40:bl_h.ERA;
  var a_sp_xera=asp.xbaAgainst?3.2+(asp.xbaAgainst-0.240)*40:bl_a.ERA;
  // xwOBA estimate from xBA: xwOBA ≈ xBA * 1.3 + 0.010
  var h_sp_xwoba=hsp.xbaAgainst?hsp.xbaAgainst*1.3+0.010:0.320;
  var a_sp_xwoba=asp.xbaAgainst?asp.xbaAgainst*1.3+0.010:0.320;
  var h_sp_pa=hsp.pa||500;
  var a_sp_pa=asp.pa||500;

  // Bullpen ERA proxy: team_ERA = 0.55*SP_ERA + 0.45*pen_ERA → pen = (team - 0.55*sp) / 0.45
  var h_sp_era_est=h_sp_xera;var a_sp_era_est=a_sp_xera;
  var h_pen=Math.max(2,Math.min(7,(h_era-0.55*h_sp_era_est)/0.45));
  var a_pen=Math.max(2,Math.min(7,(a_era-0.55*a_sp_era_est)/0.45));

  // Fatigue / rest / schedule
  var hf=fat[g.home]||{games:0,minRest:3};
  var af=fat[g.away]||{games:0,minRest:3};
  var h_rest=hf.minRest||3;var a_rest=af.minRest||3;
  var h_g3=hf.games||0;var a_g3=af.games||0;

  // Travel (away team timezone crossings)
  var h_tz=MLB_TZ[g.home]||1;
  var a_tz=MLB_TZ[g.away]||1;
  var travel=Math.abs(h_tz-a_tz);

  // Park factor
  var park=PARK_FACTORS[g.home]||1.0;

  // ── Build feature vector ──
  return {
    f_home:       1.0,
    f_pyth:       h_pyth-a_pyth,
    f_l10:        h_l10-a_l10,
    f_l30:        h_l30-a_l30,
    f_l10_rd:     (h_l10_rd-a_l10_rd)/5,
    f_wrc:        (h_wrc-a_wrc)/100,
    f_ops:        h_ops-a_ops,
    f_xwoba_bat:  h_xwoba-a_xwoba,
    f_barrel:     h_barrel-a_barrel,
    f_ev:         (h_ev-a_ev)/10,
    f_era:        a_era-h_era,  // Positive = home has better pitching
    f_fip:        a_fip-h_fip,
    f_bb9:        (a_bb9-h_bb9)/3,
    f_sp_xera:    (a_sp_xera-h_sp_xera)/2,
    f_sp_xwoba:   (a_sp_xwoba-h_sp_xwoba)*5,
    f_matchup:    (a_sp_xwoba*h_wrc/100)-(h_sp_xwoba*a_wrc/100),
    f_pen:        (a_pen-h_pen)/2,
    f_park:       park,
    f_rest_diff:  Math.min(3,(h_rest-a_rest))/3,
    f_sched:      (a_g3-h_g3)/3,
    f_travel:     travel/3,
    f_sp_x_bat:   ((a_sp_xera-h_sp_xera)/2)*((h_wrc-a_wrc)/100),
    f_pen_x_sched:((a_pen-h_pen)/3)*((a_g3-h_g3)/3),
    f_form_x_rd:  (h_l10-a_l10)*((h_l10_rd-a_l10_rd)/5)
  };
}

function parseCSV(text){
  var lines=text.trim().split("\n");
  if(lines.length<2)return[];
  // Robust CSV field splitter (handles quoted fields with commas)
  function splitCSVLine(line){
    var fields=[];var field="";var inQ=false;
    for(var c=0;c<line.length;c++){
      var ch=line[c];
      if(ch==='"'){
        if(inQ&&c+1<line.length&&line[c+1]==='"'){field+='"';c++;}
        else{inQ=!inQ;}
      }else if(ch===','&&!inQ){fields.push(field.trim());field="";}
      else{field+=ch;}
    }
    fields.push(field.trim());
    return fields;
  }
  var headers=splitCSVLine(lines[0]);
  // Normalize headers: trim whitespace, BOM, quotes
  headers=headers.map(function(h){return h.replace(/^\uFEFF/,'').replace(/^"|"$/g,'').trim();});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    var vals=splitCSVLine(lines[i]);
    if(vals.length<headers.length*0.8)continue; // allow minor mismatches
    var obj={};
    headers.forEach(function(h,j){
      var v=vals[j]!=null?vals[j].replace(/^"|"$/g,'').trim():"";
      var n=parseFloat(v);
      obj[h]=isNaN(n)?v:n;
    });
    rows.push(obj);
  }
  return rows;
}

        if(sit==="all"||sit==="") priorTeams[team]=row;
      });
    }
    console.log("[DE] MoneyPuck prior-year teams: "+Object.keys(priorTeams).length+" ("+priorSit+")");
  }catch(e){console.log("[DE] Prior-year teams failed:",e.message);}

  try{
    var pgUrl="https://moneypuck.com/moneypuck/playerData/seasonSummary/"+(season-1)+"/regular/goalies.csv";
    var rg=await corsProxyFetch(pgUrl);
    var tg=await rg.text();
    parseCSV(tg).forEach(function(row){
      if((row.situation||row.Situation||row.SITUATION||"all").toString().trim().toLowerCase()!=="all")return;
      var team=(row.team||"").toString().trim();
      if(!priorGoalies[team])priorGoalies[team]=[];
      var gp=row.games_played||0;var xga=row.xGoals||0;var ga=row.goals||0;
      var shots=row.ongoal||row.onGoal||0;var sv=shots>0?1-(ga/shots):0.910;
      var hdS=row.highDangerShots||0;var hdG=row.highDangerGoals||0;
      priorGoalies[team].push({gp:gp,gsax:xga-ga,gsax_pg:gp>0?(xga-ga)/gp:0,
        sv_pct:sv,hd_sv_pct:hdS>0?1-(hdG/hdS):0.850});
    });
    Object.keys(priorGoalies).forEach(function(t){
      priorGoalies[t].sort(function(a,b){return b.gp-a.gp;});
    });
    console.log("[DE] MoneyPuck prior-year goalies: "+Object.keys(priorGoalies).length);
  }catch(e){}

  S.nhl.mp={teams:mpTeams,goalies:mpGoalies,priorTeams:priorTeams,priorGoalies:priorGoalies,loaded:true};
  
  // Normalize: ensure all ABBR_TO_MP codes can find their data
  // MoneyPuck may use alternate codes (e.g., "SJ" vs "S.J", "LA" vs "L.A", "TB" vs "T.B", "NJ" vs "N.J")
  // Also handle Utah Hockey Club → MoneyPuck may still use "ARI"
  var mpAliases={"S.J":["SJ","SJS"],"L.A":["LA","LAK"],"T.B":["TB","TBL"],"N.J":["NJ","NJD"],"UTA":["ARI","UTAH"],"MTL":["MON","MTL"]};
  function ensureMPKey(store,primaryKey){
    if(store[primaryKey]&&Object.keys(store[primaryKey]).length>3)return;
    var aliases=mpAliases[primaryKey]||[];
    // Also try without dots
    var noDot=primaryKey.replace(/\./g,"");
    if(noDot!==primaryKey&&aliases.indexOf(noDot)<0)aliases.push(noDot);
    for(var ai=0;ai<aliases.length;ai++){
      if(store[aliases[ai]]&&Object.keys(store[aliases[ai]]).length>3){
        store[primaryKey]=store[aliases[ai]];
        console.log("[DE] MP alias: "+primaryKey+" ← "+aliases[ai]);
        return;
      }
    }
    // Try all keys for partial match
    Object.keys(store).forEach(function(k){
      if(store[primaryKey]&&Object.keys(store[primaryKey]).length>3)return;
      if(k.replace(/\./g,"")===primaryKey.replace(/\./g,"")){
        store[primaryKey]=store[k];
        console.log("[DE] MP fuzzy match: "+primaryKey+" ← "+k);
      }
    });
  }
  Object.values(ABBR_TO_MP).forEach(function(mpCode){
    ensureMPKey(mpTeams,mpCode);
    ensureMPKey(priorTeams,mpCode);
    // For goalies (arrays), similar alias check
    if(!mpGoalies[mpCode]||!mpGoalies[mpCode].length){
      var gAliases=mpAliases[mpCode]||[mpCode.replace(/\./g,"")];
      for(var gi=0;gi<gAliases.length;gi++){
        if(mpGoalies[gAliases[gi]]&&mpGoalies[gAliases[gi]].length){
          mpGoalies[mpCode]=mpGoalies[gAliases[gi]];break;
        }
      }
    }
    if(!priorGoalies[mpCode]||!priorGoalies[mpCode].length){
      var pgAliases=mpAliases[mpCode]||[mpCode.replace(/\./g,"")];
      for(var pgi=0;pgi<pgAliases.length;pgi++){
        if(priorGoalies[pgAliases[pgi]]&&priorGoalies[pgAliases[pgi]].length){
          priorGoalies[mpCode]=priorGoalies[pgAliases[pgi]];break;
        }
      }
    }
  });
  
  // Log diagnostic: which teams have data
  var mpTeamCount=Object.keys(mpTeams).filter(function(k){return Object.keys(mpTeams[k]).length>5}).length;
  var mpGoalieCount=Object.keys(mpGoalies).filter(function(k){return mpGoalies[k].length>0}).length;
  console.log("[DE] MoneyPuck final: "+mpTeamCount+" teams with stats, "+mpGoalieCount+" teams with goalies");
  console.log("[DE] MoneyPuck data stored in S.nhl.mp");
}

// ═══ V5 FEATURE COMPUTATION WITH MONEYPUCK ═════════════
function computeNHLv5Features(g){
  var standings=S.nhl.standings||{};
  var fatigue=S.nhl.fatigue||{};
  var mp=S.nhl.mp||{teams:{},goalies:{},priorTeams:{},priorGoalies:{}};
  var hAbbr=NHL_ABBREVS[g.home]||"";
  var aAbbr=NHL_ABBREVS[g.away]||"";
  var hMP=ABBR_TO_MP[hAbbr]||hAbbr;
  var aMP=ABBR_TO_MP[aAbbr]||aAbbr;

  // Standings
  var hS=standings[hAbbr]||{};var aS=standings[aAbbr]||{};
  var hF=fatigue[hAbbr]||{b2b:false,restDays:3};
  var aF=fatigue[aAbbr]||{b2b:false,restDays:3};
  var hGP=Math.max((hS.wins||0)+(hS.losses||0)+(hS.otl||0),1);
  var aGP=Math.max((aS.wins||0)+(aS.losses||0)+(aS.otl||0),1);
  var hWP=(hS.wins||0)/hGP;var aWP=(aS.wins||0)/aGP;
  var hGF=(hS.goalsFor||hS.goalFor||0)/hGP;
  var hGA=(hS.goalsAgainst||hS.goalAgainst||0)/hGP;
  var aGF=(aS.goalsFor||aS.goalFor||0)/aGP;
  var aGA=(aS.goalsAgainst||aS.goalAgainst||0)/aGP;
  function pyth2(gf,ga){return gf*gf/(gf*gf+ga*ga)||0.5;}
  var hPyth=pyth2(hGF,hGA);var aPyth=pyth2(aGF,aGA);
  var hL10W=hS.l10W||0;var hL10T=Math.max(hL10W+(hS.l10L||0)+(hS.l10OTL||0),1);
  var aL10W=aS.l10W||0;var aL10T=Math.max(aL10W+(aS.l10L||0)+(aS.l10OTL||0),1);
  var hB2B=hF.b2b?1:0;var aB2B=aF.b2b?1:0;
  var hRegRate=Math.max(0,(hS.wins||0)-Math.round(hGP*0.08))/hGP;
  var aRegRate=Math.max(0,(aS.wins||0)-Math.round(aGP*0.08))/aGP;

  // MoneyPuck team stats (current season, blended with prior)
  // Blend: if <20 GP use prior, 20-50 blend, >50 current
  function blendStat(cur,prior,key,def){
    var cv=cur?parseFloat(cur[key])||def:def;
    var pv=prior?parseFloat(prior[key])||def:def;
    if(hGP<20)return pv;
    if(hGP>=50)return cv;
    var w=(hGP-20)/30;
    return pv*(1-w)+cv*w;
  }
  var hT=mp.teams[hMP]||{};var aT=mp.teams[aMP]||{};
  var hTP=mp.priorTeams[hMP]||{};var aTP=mp.priorTeams[aMP]||{};
  var hasMP=Object.keys(hT).length>5&&Object.keys(aT).length>5;

  // Goalie data (current + prior, B2B-aware, DailyFaceoff-aware)
  var hGoalies=mp.goalies[hMP]||[];var aGoalies=mp.goalies[aMP]||[];
  var hPGoalies=mp.priorGoalies[hMP]||[];var aPGoalies=mp.priorGoalies[aMP]||[];
  function getGoalie(cur,prior,idx){
    var c=cur[idx]||null;var p=prior[idx]||{gsax:0,gsax_pg:0,sv_pct:0.910,hd_sv_pct:0.850};
    if(!c)return p;
    if((c.gp||0)<10)return p;
    if((c.gp||0)>=30)return c;
    var w=((c.gp||0)-10)/20;
    return{gsax_pg:(p.gsax_pg||0)*(1-w)+(c.gsax_pg||0)*w,
           sv_pct:(p.sv_pct||0.910)*(1-w)+(c.sv_pct||0.910)*w,
           hd_sv_pct:(p.hd_sv_pct||0.850)*(1-w)+(c.hd_sv_pct||0.850)*w,
           name:c.name||""};
  }
  // Find goalie by name in MoneyPuck array (for DailyFaceoff matching)
  function findGoalieByName(cur,prior,name){
    if(!name)return null;
    var nameLower=name.toLowerCase().trim();
    for(var i=0;i<cur.length;i++){
      var gName=(cur[i].name||"").toLowerCase().trim();
      // Try exact match first
      if(gName===nameLower)return getGoalie(cur,prior,i);
      // Try last name match (DailyFaceoff="Connor Ingram", MP may have "Connor.Ingram" or similar)
      var nameParts=nameLower.split(" ");var gParts=gName.split(/[\s.]+/);
      if(nameParts.length>=2&&gParts.length>=2&&nameParts[nameParts.length-1]===gParts[gParts.length-1]&&nameParts[0]===gParts[0])return getGoalie(cur,prior,i);
      // Try last name only (fallback)
      if(nameParts.length>=2&&gParts.length>=2&&nameParts[nameParts.length-1]===gParts[gParts.length-1])return getGoalie(cur,prior,i);
    }
    return null;// Not found in MoneyPuck data
  }
  var hStarter=getGoalie(hGoalies,hPGoalies,0);
  var aStarter=getGoalie(aGoalies,aPGoalies,0);
  var hBackup=getGoalie(hGoalies,hPGoalies,1);
  var aBackup=getGoalie(aGoalies,aPGoalies,1);

  // ═══ DailyFaceoff override: use confirmed goalie's actual stats ═══
  // g.homeGoalie and g.awayGoalie are set by DailyFaceoff in enrichNHLGames before this function is called
  var hDFGoalie=g.homeGoalie?findGoalieByName(hGoalies,hPGoalies,g.homeGoalie):null;
  var aDFGoalie=g.awayGoalie?findGoalieByName(aGoalies,aPGoalies,g.awayGoalie):null;

  // Effective goalie priority: DailyFaceoff confirmed > B2B backup logic > default starter
  var hEff, aEff;
  if(hDFGoalie&&g.homeGoalieConfirmed){
    hEff=hDFGoalie;// Use DailyFaceoff confirmed goalie's actual stats
  }else{
    hEff=hB2B?hBackup:hStarter;// Fallback to B2B logic
  }
  if(aDFGoalie&&g.awayGoalieConfirmed){
    aEff=aDFGoalie;// Use DailyFaceoff confirmed goalie's actual stats
  }else{
    aEff=aB2B?aBackup:aStarter;// Fallback to B2B logic
  }

  // MoneyPuck feature helpers
  var hMGP=Math.max(blendStat(hT,hTP,"games_played",82),1);
  var aMGP=Math.max(blendStat(aT,aTP,"games_played",82),1);

  function mpDiff(key,def){
    return (blendStat(hT,hTP,key,def)-blendStat(aT,aTP,key,def));
  }
  function mpRate(teamCur,teamPrior,keyFor,keyAgainst,def){
    var f=blendStat(teamCur,teamPrior,keyFor,def);
    var a=blendStat(teamCur,teamPrior,keyAgainst,def);
    return f-a;
  }

  // PP/PK
  var hPP=(hS.ppPct||20)/100;var aPP=(aS.ppPct||20)/100;
  var hPK=(hS.pkPct||80)/100;var aPK=(aS.pkPct||80)/100;

  var features = {
    f_home: 1.0,
    f_power: hPyth-aPyth,
    f_gd_pace: ((hGF-hGA)-(aGF-aGA))/2,
    f_season_wp: hWP-aWP,
    f_l20: hL10W/hL10T-aL10W/aL10T,
    f_b2b: aB2B-hB2B,
    f_reg_win: hRegRate-aRegRate,
    f_rest: Math.min(3,((hF.restDays||3)-(aF.restDays||3)))/3,
    f_pp_pk: ((hPP-(1-aPK))+((1-hPK)-aPP))/0.2,

    // MoneyPuck advanced features
    f_gsax: (hEff.gsax_pg-aEff.gsax_pg)*10,
    f_xgf: hasMP?(blendStat(hT,hTP,"xGoalsPercentage",50)-blendStat(aT,aTP,"xGoalsPercentage",50))/10:0,
    f_hd_diff: hasMP?((mpRate(hT,hTP,"highDangerShotsFor","highDangerShotsAgainst",0)-mpRate(aT,aTP,"highDangerShotsFor","highDangerShotsAgainst",0))/hMGP/0.5):0,
    f_xg_luck: hasMP?(-((blendStat(hT,hTP,"goalsFor",0)-blendStat(hT,hTP,"xGoalsFor",0))-(blendStat(aT,aTP,"goalsFor",0)-blendStat(aT,aTP,"xGoalsFor",0)))/hMGP/0.3):0,
    f_sva_xg: hasMP?((mpRate(hT,hTP,"scoreVenueAdjustedxGoalsFor","scoreVenueAdjustedxGoalsAgainst",0)-mpRate(aT,aTP,"scoreVenueAdjustedxGoalsFor","scoreVenueAdjustedxGoalsAgainst",0))/hMGP/0.3):0,
    f_faceoff: hasMP?((blendStat(hT,hTP,"faceOffsWonFor",50)/(blendStat(hT,hTP,"faceOffsWonFor",50)+blendStat(hT,hTP,"faceOffsWonAgainst",50)||1))-(blendStat(aT,aTP,"faceOffsWonFor",50)/(blendStat(aT,aTP,"faceOffsWonFor",50)+blendStat(aT,aTP,"faceOffsWonAgainst",50)||1)))*10:0,
    f_turnovers: hasMP?(((blendStat(hT,hTP,"takeawaysFor",0)-blendStat(hT,hTP,"giveawaysFor",0))/hMGP-(blendStat(aT,aTP,"takeawaysFor",0)-blendStat(aT,aTP,"giveawaysFor",0))/aMGP)/3):0,
    f_rebounds: hasMP?((blendStat(hT,hTP,"reboundsFor",0)/hMGP-blendStat(aT,aTP,"reboundsFor",0)/aMGP)/3):0,
    f_rebound_goals: hasMP?((blendStat(hT,hTP,"reboundGoalsFor",0)/hMGP-blendStat(aT,aTP,"reboundGoalsFor",0)/aMGP)*5):0,
    f_hd_share: hasMP?((blendStat(hT,hTP,"highDangerShotsFor",10)/Math.max(blendStat(hT,hTP,"shotsOnGoalFor",30),1)-blendStat(aT,aTP,"highDangerShotsFor",10)/Math.max(blendStat(aT,aTP,"shotsOnGoalFor",30),1))*10):0,
    f_corsi: hasMP?(blendStat(hT,hTP,"corsiPercentage",50)-blendStat(aT,aTP,"corsiPercentage",50))/10:0,
    f_shots: hasMP?((mpRate(hT,hTP,"shotsOnGoalFor","shotsOnGoalAgainst",0)-mpRate(aT,aTP,"shotsOnGoalFor","shotsOnGoalAgainst",0))/hMGP):0,

    // Goalie features
    f_goalie_sv: (hEff.sv_pct-aEff.sv_pct)*100,
    f_goalie_hd_sv: (hEff.hd_sv_pct-aEff.hd_sv_pct)*50,
    f_goalie_depth: ((aStarter.sv_pct-aBackup.sv_pct)-(hStarter.sv_pct-hBackup.sv_pct))*50,

    // Interactions
    f_b2b_x_backup: (aB2B-hB2B)*(hEff.gsax_pg-aEff.gsax_pg)*10,
    f_gsax_x_xgf: (hEff.gsax_pg-aEff.gsax_pg)*(hasMP?(blendStat(hT,hTP,"xGoalsPercentage",50)-blendStat(aT,aTP,"xGoalsPercentage",50))/10:0),
    f_pp_x_draw: hasMP?((hPP-(1-aPK))*(blendStat(hT,hTP,"penalityMinutesDrawnFor",0)/hMGP-blendStat(aT,aTP,"penalityMinutesDrawnFor",0)/aMGP)/5):0
  };

  // Store MP status on game for display
  g.mpLoaded=hasMP;
  g.mpFeatureCount=hasMP?27:10;
  // Store goalie names and stats — use effective goalie (may be DailyFaceoff-matched)
  if(hGoalies[0])g.mpHomeGoalie=hGoalies[0].name||"";
  if(aGoalies[0])g.mpAwayGoalie=aGoalies[0].name||"";
  // GSAx: use the effective goalie's stats (accounts for DailyFaceoff confirmed starter)
  g.mpHomeGSAx=hEff.gsax_pg?hEff.gsax_pg*(hEff.gp||30):hEff.gsax||0;
  g.mpAwayGSAx=aEff.gsax_pg?aEff.gsax_pg*(aEff.gp||30):aEff.gsax||0;
  // Log when DailyFaceoff overrides the default starter
  if(hDFGoalie&&g.homeGoalieConfirmed&&hGoalies[0]&&(hDFGoalie.name||"").toLowerCase()!==(hGoalies[0].name||"").toLowerCase()){
    console.log("[DE] Goalie override: "+g.home+" using "+g.homeGoalie+" (DF confirmed) instead of "+hGoalies[0].name+" (MP #1 GP)");
  }
  if(aDFGoalie&&g.awayGoalieConfirmed&&aGoalies[0]&&(aDFGoalie.name||"").toLowerCase()!==(aGoalies[0].name||"").toLowerCase()){
    console.log("[DE] Goalie override: "+g.away+" using "+g.awayGoalie+" (DF confirmed) instead of "+aGoalies[0].name+" (MP #1 GP)");
  }

  return features;
}

function predictV11b(features){
  // Run sigmoid(weights · features + bias)
  var z=V11B_MODEL.bias;
  V11B_MODEL.features.forEach(function(fname){
    var w=V11B_MODEL.weights[fname]||0;
    var x=features[fname]||0;
    z+=w*x;
  });
  return sigmoid(z);
}

// ── Weather → Model Adjustment ──
function calcWeatherAdj(wx){
  if(!wx||wx.indoor)return{totalAdj:0,mlAdj:0,desc:"Dome — no adjustment"};
  var totalAdj=0;var desc=[];
  if(wx.temp>70){
    totalAdj+=(wx.temp-70)/10*0.3;
    desc.push("🌡 "+wx.temp+"°F: +"+(((wx.temp-70)/10*0.3).toFixed(1))+" runs");
  }else if(wx.temp<55){
    totalAdj-=(55-wx.temp)/10*0.2;
    desc.push("🥶 "+wx.temp+"°F: "+(((55-wx.temp)/10*-0.2).toFixed(1))+" runs");
  }
  if(wx.wind>=15){totalAdj+=0.5;desc.push("🌬 "+wx.wind+"mph: +0.5 runs");}
  var mlAdj=totalAdj*0.008;
  return{totalAdj:+totalAdj.toFixed(1),mlAdj:+mlAdj.toFixed(3),desc:desc.join(" · ")||"Neutral"};
}

// ── Umpire → Model Adjustment ──
function calcUmpAdj(umpTendency,homePitchAdv){
  if(umpTendency==="high"){
    var adj=homePitchAdv>0?0.015:-0.015;
    return{mlAdj:adj,desc:"⬆️ High-K ump: "+(adj>0?"+":"")+((adj*100).toFixed(1))+"% to pitching side"};
  }else if(umpTendency==="low"){
    var adj2=homePitchAdv>0?-0.008:0.008;
    return{mlAdj:adj2,desc:"⬇️ Low-K ump: "+(adj2>0?"+":"")+((adj2*100).toFixed(1))+"% to hitting side"};
  }
  return{mlAdj:0,desc:"Neutral ump"};
}

// ═══════════════════════════════════════════════════════════
// ENRICH MLB GAMES — compute features, run model, set edges
// ═══════════════════════════════════════════════════════════

function enrichMLBGames(games){
  return games.map(function(g){
    var info=S.mlb.lineups[g.home]||{};
    var wx=S.mlb.weather[g.home];

    // ── Run v11b model ──
    var features=computeFeatures(g);
    var modelProb=predictV11b(features); // P(home win)
    g.modelProb=+modelProb.toFixed(4);
    g.features=features;

    // Weather post-adjustment
    var wxAdj=calcWeatherAdj(wx);
    g.wxTotalAdj=wxAdj.totalAdj;
    g.wxMLAdj=wxAdj.mlAdj;
    g.wxDesc=wxAdj.desc;

    // Umpire post-adjustment
    var homePitchAdv=features.f_era; // positive = home better pitching
    var umpAdj=calcUmpAdj(info.umpTendency||"neutral",homePitchAdv);
    g.umpMLAdj=umpAdj.mlAdj;
    g.umpDesc=umpAdj.desc;

    // Apply post-model adjustments
    var adjProb=Math.min(0.80,Math.max(0.20,modelProb+wxAdj.mlAdj+umpAdj.mlAdj));
    g.modelFairH=+(adjProb*100).toFixed(1);
    g.modelFairA=+(100-g.modelFairH).toFixed(1);

    // Calculate edges: model probability vs best available book odds
    g.modelHEdge=+((1/ml2p(g.bestHML))*(g.modelFairH/100)*100-100).toFixed(1);
    g.modelAEdge=+((1/ml2p(g.bestAML))*(g.modelFairA/100)*100-100).toFixed(1);
    g.modelTopEdge=Math.max(g.modelHEdge,g.modelAEdge);
    g.modelBetSide=g.modelTopEdge>3?(g.modelHEdge>=g.modelAEdge?"HOME":"AWAY"):null;

    // Team stats for display
    var ts=S.mlb.teamStats||{};
    g.homeStats=ts[g.home]||null;
    g.awayStats=ts[g.away]||null;

    return g;
  });
}


function processOdds(apiData){
  var now=new Date();
  return apiData.map(function(ev){
    var gt=new Date(ev.commence_time);
    if(gt<now)return null;
    var home=ev.home_team,away=ev.away_team;
    var bd={},hMLs=[],aMLs=[],tots=[];
    (ev.bookmakers||[]).forEach(function(bm){
      var pa=PA.find(function(b){return b.key===bm.key});
      if(!pa)return;
      var hml=null,aml=null,tot=null,hSpread=null,hSpreadOdds=null,aSpread=null,aSpreadOdds=null;
      (bm.markets||[]).forEach(function(mkt){
        if(mkt.key==="h2h")mkt.outcomes.forEach(function(o){
          if(o.name===home)hml=o.price;if(o.name===away)aml=o.price;
        });
        if(mkt.key==="totals")mkt.outcomes.forEach(function(o){
          if(o.name==="Over")tot=o.point;
        });
        if(mkt.key==="spreads")mkt.outcomes.forEach(function(o){
          if(o.name===home){hSpread=o.point;hSpreadOdds=o.price;}
          if(o.name===away){aSpread=o.point;aSpreadOdds=o.price;}
        });
      });
      bd[pa.id]={homeML:hml,awayML:aml,total:tot,hSpread:hSpread,hSpreadOdds:hSpreadOdds,aSpread:aSpread,aSpreadOdds:aSpreadOdds};
      if(hml!=null)hMLs.push(hml);if(aml!=null)aMLs.push(aml);if(tot!=null)tots.push(tot);
    });
    if(!hMLs.length)return null;
    var hPs=hMLs.map(ml2p),aPs=aMLs.map(ml2p);
    var avgH=hPs.reduce(function(a,b){return a+b},0)/hPs.length;
    var avgA=aPs.reduce(function(a,b){return a+b},0)/aPs.length;
    var tp=avgH+avgA;
    var fairH=+(avgH/tp*100).toFixed(1),fairA=+(avgA/tp*100).toFixed(1);
    var bestHML=Math.max.apply(null,hMLs),bestAML=Math.max.apply(null,aMLs);
    var bestHB=null,bestAB=null;
    Object.keys(bd).forEach(function(k){if(bd[k].homeML===bestHML)bestHB=k;if(bd[k].awayML===bestAML)bestAB=k});
    var conTot=tots.length?+(tots.reduce(function(a,b){return a+b},0)/tots.length).toFixed(1):null;
    var loTot=tots.length?Math.min.apply(null,tots):null;
    var hiTot=tots.length?Math.max.apply(null,tots):null;
    var hEdge=+((1/ml2p(bestHML))*(fairH/100)*100-100).toFixed(1);
    var aEdge=+((1/ml2p(bestAML))*(fairA/100)*100-100).toFixed(1);
    var topEdge=Math.max(hEdge,aEdge);
    var betSide=topEdge>3?(hEdge>=aEdge?"HOME":"AWAY"):null;

    // Find best puck line / run line
    var bestHSpreadOdds=-999,bestASpreadOdds=-999,bestHSpreadBook=null,bestASpreadBook=null;
    var plSpread=null;
    Object.keys(bd).forEach(function(k){
      var d=bd[k];
      if(d.hSpreadOdds!=null&&d.hSpreadOdds>bestHSpreadOdds){bestHSpreadOdds=d.hSpreadOdds;bestHSpreadBook=k;plSpread=d.hSpread;}
      if(d.aSpreadOdds!=null&&d.aSpreadOdds>bestASpreadOdds){bestASpreadOdds=d.aSpreadOdds;bestASpreadBook=k;if(!plSpread)plSpread=d.aSpread;}
    });

    return{id:ev.id,home:home,away:away,time:ev.commence_time,
      fairH:fairH,fairA:fairA,bestHML:bestHML,bestAML:bestAML,bestHB:bestHB,bestAB:bestAB,
      hEdge:hEdge,aEdge:aEdge,topEdge:topEdge,betSide:betSide,
      conTot:conTot,loTot:loTot,hiTot:hiTot,bd:bd,
      plSpread:plSpread,bestHSpreadOdds:bestHSpreadOdds>-999?bestHSpreadOdds:null,
      bestASpreadOdds:bestASpreadOdds>-999?bestASpreadOdds:null,
      bestHSpreadBook:bestHSpreadBook,bestASpreadBook:bestASpreadBook};
  }).filter(function(g){return g!=null});
}

// ═══════════════════════════════════════════════════════════
// NHL MODEL — Apply context adjustments to edge calculation
// ═══════════════════════════════════════════════════════════
// Model factors (weights based on NHL betting research):
//   rest_advantage: 0.25 — biggest documented edge
//   goalie_factor:  0.20 — goalie swaps move lines 20-30¢
//   form_l10:       0.20 — last-10 record as momentum proxy
//   special_teams:  0.15 — PP/PK mismatch
//   home_ice:       0.10 — ~2-3% baseline advantage
//   travel:         0.10 — cross-timezone penalty

function enrichNHLGames(games){
  var sched=S.nhl.schedule||{};var standings=S.nhl.standings||{};var fatigue=S.nhl.fatigue||{};
  var df=S.nhl.dailyfaceoff||{};
  return games.map(function(g){
    var hAbbr=NHL_ABBREVS[g.home]||"";var aAbbr=NHL_ABBREVS[g.away]||"";
    var schedInfo=sched[hAbbr]||{};

    // ═══ GOALIE PRIORITY: DailyFaceoff > NHL API > MoneyPuck ═══
    // 1. Start with NHL API schedule (usually empty now)
    g.homeGoalie=schedInfo.homeGoalie||null;g.awayGoalie=schedInfo.awayGoalie||null;
    g.homeGoalieConfirmed=schedInfo.homeGoalieConfirmed||false;g.awayGoalieConfirmed=schedInfo.awayGoalieConfirmed||false;

    // 2. DailyFaceoff OVERRIDES — primary confirmed source
    var dfInfo=df[g.home]||df[g.away]||null;
    if(dfInfo){
      // Match by checking if this game's home team matches DailyFaceoff's home team
      if(dfInfo.homeTeam===g.home||dfInfo.homeTeam===g.home){
        if(dfInfo.homeGoalie){g.homeGoalie=dfInfo.homeGoalie;g.homeGoalieConfirmed=dfInfo.homeGoalieConfirmed;}
        if(dfInfo.awayGoalie){g.awayGoalie=dfInfo.awayGoalie;g.awayGoalieConfirmed=dfInfo.awayGoalieConfirmed;}
        g.homeGoalieStatus=dfInfo.homeGoalieStatus||"";
        g.awayGoalieStatus=dfInfo.awayGoalieStatus||"";
        g.dfLoaded=true;
      }else if(dfInfo.awayTeam===g.home){
        // Teams are flipped in our lookup — swap
        if(dfInfo.awayGoalie){g.homeGoalie=dfInfo.awayGoalie;g.homeGoalieConfirmed=dfInfo.awayGoalieConfirmed;}
        if(dfInfo.homeGoalie){g.awayGoalie=dfInfo.homeGoalie;g.awayGoalieConfirmed=dfInfo.homeGoalieConfirmed;}
        g.homeGoalieStatus=dfInfo.awayGoalieStatus||"";
        g.awayGoalieStatus=dfInfo.homeGoalieStatus||"";
        g.dfLoaded=true;
      }
    }
    var hFat=fatigue[hAbbr]||{b2b:false,restDays:99,gamesIn3Days:0};
    var aFat=fatigue[aAbbr]||{b2b:false,restDays:99,gamesIn3Days:0};
    g.homeB2B=hFat.b2b;g.awayB2B=aFat.b2b;g.homeRest=hFat.restDays;g.awayRest=aFat.restDays;
    g.homeGamesIn3=hFat.gamesIn3Days;g.awayGamesIn3=aFat.gamesIn3Days;
    g.restDiff=aFat.restDays-hFat.restDays;
    var hStand=standings[hAbbr]||{};var aStand=standings[aAbbr]||{};
    g.homeRecord=(hStand.wins||0)+"-"+(hStand.losses||0)+"-"+(hStand.otl||0);
    g.awayRecord=(aStand.wins||0)+"-"+(aStand.losses||0)+"-"+(aStand.otl||0);
    g.homeL10=(hStand.l10W||0)+"-"+(hStand.l10L||0)+"-"+(hStand.l10OTL||0);
    g.awayL10=(aStand.l10W||0)+"-"+(aStand.l10L||0)+"-"+(aStand.l10OTL||0);
    g.homeStreak=(hStand.streak||"")+(hStand.streakCount||"");
    g.awayStreak=(aStand.streak||"")+(aStand.streakCount||"");
    g.homeGD=hStand.goalDiff||0;g.awayGD=aStand.goalDiff||0;
    g.homePts=hStand.points||0;g.awayPts=aStand.points||0;
    g.tzDiff=Math.abs((NHL_TZ[hAbbr]||0)-(NHL_TZ[aAbbr]||0));

    // ═══ NHL V5 MODEL ═══
    var features=computeNHLv5Features(g);
    var modelProb=predictNHLv5(features);
    g.modelProb=+modelProb.toFixed(4);g.modelFairH=+(modelProb*100).toFixed(1);g.modelFairA=+(100-g.modelFairH).toFixed(1);
    g.features=features;

    // Fallback goalie names: if NHL API didn't provide them, use MoneyPuck starter (highest GP)
    if(!g.homeGoalie&&g.mpHomeGoalie)g.homeGoalie=g.mpHomeGoalie;
    if(!g.awayGoalie&&g.mpAwayGoalie)g.awayGoalie=g.mpAwayGoalie;

    var hImp=ml2p(g.bestHML)||0.5;var aImp=ml2p(g.bestAML)||0.5;
    var vigT=hImp+aImp;var fairH=hImp/vigT;var fairA=aImp/vigT;
    g.modelHEdge=+((modelProb-fairH)*100).toFixed(1);
    g.modelAEdge=+(((1-modelProb)-fairA)*100).toFixed(1);
    g.modelTopEdge=Math.max(g.modelHEdge,g.modelAEdge);
    g.modelBetSide=g.modelTopEdge>5?(g.modelHEdge>=g.modelAEdge?"HOME":"AWAY"):null;

    var signals=[];
    if(g.awayB2B&&!g.homeB2B)signals.push({icon:"🔴",text:g.away+" on B2B — model penalty applied",type:"boost"});
    if(g.homeB2B&&!g.awayB2B)signals.push({icon:"🔴",text:g.home+" on B2B — model penalty applied",type:"fade"});
    if(g.homeB2B&&g.awayB2B)signals.push({icon:"🟡",text:"Both on B2B — fatigue wash",type:"neutral"});
    if(!g.homeB2B&&!g.awayB2B&&Math.abs(g.restDiff)>=2){
      signals.push({icon:"💤",text:(g.restDiff>0?g.home:g.away)+" rest advantage",type:g.restDiff>0?"boost":"fade"});}
    if(g.tzDiff>=2&&(g.awayRest||99)<=1)signals.push({icon:"✈️",text:g.away+" crossed "+g.tzDiff+" TZ on short rest",type:"boost"});
    if(g.mpLoaded){
      signals.push({icon:"📊",text:"MoneyPuck advanced stats loaded ("+g.mpFeatureCount+" features)",type:"neutral"});
      if(Math.abs(features.f_xg_luck)>0.1)signals.push({icon:"📉",text:(features.f_xg_luck>0?g.away:g.home)+" overperforming xG — regression likely",type:features.f_xg_luck>0?"boost":"fade"});
      if(Math.abs(features.f_gsax)>0.02)signals.push({icon:"🥅",text:(features.f_gsax>0?"Home":"Away")+" goalie GSAx advantage: "+(features.f_gsax>0?"+":"")+features.f_gsax.toFixed(2),type:features.f_gsax>0?"boost":"fade"});
    }else{
      signals.push({icon:"⚠️",text:"MoneyPuck data not loaded — using "+g.mpFeatureCount+" features",type:"neutral"});}
    if(!g.homeGoalieConfirmed&&!g.awayGoalieConfirmed)signals.push({icon:"🥅",text:g.dfLoaded?"Goalies not yet confirmed — via DailyFaceoff":"Goalies TBD — check DailyFaceoff",type:"neutral"});
    if(!signals.length)signals.push({icon:"📊",text:"No strong signals",type:"neutral"});
    g.signals=signals;

    g.contextAdj=0;g.adjEdge=g.modelTopEdge;g.adjBetSide=g.modelBetSide;
    g.hEdge=g.modelHEdge;g.aEdge=g.modelAEdge;g.topEdge=g.modelTopEdge;

    g.b2bStack=false;g.b2bStackSide=null;
    if(g.awayB2B&&!g.homeB2B&&g.modelHEdge>3){g.b2bStack=true;g.b2bStackSide="HOME";}
    else if(g.homeB2B&&!g.awayB2B&&g.modelAEdge>3){g.b2bStack=true;g.b2bStackSide="AWAY";}
    return g;
  });
}

// ═══ DAILYFACEOFF STARTING GOALIES ═══
// Primary source for confirmed/projected starters — NHL API no longer provides this data
async function fetchDailyFaceoff(){
  try{
    var url="https://www.dailyfaceoff.com/starting-goalies/";
    var resp=await fetch(CF_WORKER+encodeURIComponent(url));
    if(!resp||!resp.ok)return{};
    var html=await resp.text();
    // Extract __NEXT_DATA__ JSON from the page
    var m=html.match(/<script id="__NEXT_DATA__" type="application\/json">(.*?)<\/script>/);
    if(!m)return{};
    var data=JSON.parse(m[1]);
    var games=data.props&&data.props.pageProps&&data.props.pageProps.data||[];
    var result={};
    // Build lookup by team name → {goalieName, status}
    games.forEach(function(g){
      var hName=g.homeTeamName||"";
      var aName=g.awayTeamName||"";
      var hGoalie=g.homeGoalieName||null;
      var aGoalie=g.awayGoalieName||null;
      var hStatus=g.homeNewsStrengthName||"";// "Confirmed", "Likely", "Expected", "Unconfirmed"
      var aStatus=g.awayNewsStrengthName||"";
      var hConfirmed=hStatus.toLowerCase()==="confirmed";
      var aConfirmed=aStatus.toLowerCase()==="confirmed";
      // Store by home team name (matches Odds API names used in g.home)
      result[hName]={
        homeGoalie:hGoalie,awayGoalie:aGoalie,
        homeGoalieConfirmed:hConfirmed,awayGoalieConfirmed:aConfirmed,
        homeGoalieStatus:hStatus,awayGoalieStatus:aStatus,
        homeTeam:hName,awayTeam:aName,
        // Also store stats for display
        homeGAA:g.homeGoalieGoalsAgainstAvg,homeSV:g.homeGoalieSavePercentage,
        awayGAA:g.awayGoalieGoalsAgainstAvg,awaySV:g.awayGoalieSavePercentage,
        homeRecord:(g.homeGoalieWins||0)+"W-"+(g.homeGoalieLosses||0)+"L",
        awayRecord:(g.awayGoalieWins||0)+"W-"+(g.awayGoalieLosses||0)+"L",
      };
      // Also index by away team name for reverse lookups
      result[aName]={
        homeGoalie:hGoalie,awayGoalie:aGoalie,
        homeGoalieConfirmed:hConfirmed,awayGoalieConfirmed:aConfirmed,
        homeGoalieStatus:hStatus,awayGoalieStatus:aStatus,
        homeTeam:hName,awayTeam:aName,
        homeGAA:g.homeGoalieGoalsAgainstAvg,homeSV:g.homeGoalieSavePercentage,
        awayGAA:g.awayGoalieGoalsAgainstAvg,awaySV:g.awayGoalieSavePercentage,
        homeRecord:(g.homeGoalieWins||0)+"W-"+(g.homeGoalieLosses||0)+"L",
        awayRecord:(g.awayGoalieWins||0)+"W-"+(g.awayGoalieLosses||0)+"L",
      };
    });
    console.log("[DE] DailyFaceoff: "+games.length+" games, goalies loaded");
    return result;
  }catch(e){console.log("[DE] DailyFaceoff error:",e);return{};}
}
